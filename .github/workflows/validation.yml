name: Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pull-request-metadata:
    name: Pull request metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify pull request body
        run: npm run pr:check

      - name: Verify change completeness
        run: npm run change:check

      - name: Lint ownership map
        run: npm run ownership:lint

  specialist-delegation-verification:
    name: Specialist delegation verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run specialist delegation verification matrix
        run: npm run test:delegation:verification

  repo-validation:
    name: Repo validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify standards governance artifacts
        run: |
          npm run standards:check
          npm run ownership:lint

      - name: Run unit, contract, integration, e2e, property, performance, security, and chaos suites
        run: |
          npm run test:unit
          node --test tests/contract/*.test.js tests/integration/role-inbox-filtering.integration.test.js tests/integration/pm-overview-filtering.integration.test.js tests/integration/task-list-owner-filters.integration.test.js tests/integration/task-assignment-integration.test.js tests/e2e/*.test.js tests/property/*.test.js tests/performance/*.test.js tests/security/*.test.js chaos/*.test.js

  browser-validation:
    name: Browser validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright browser suite
        run: npm run test:browser
