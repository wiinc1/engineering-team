name: Governance Drift

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  governance-drift:
    name: Governance drift report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print governance drift report
        run: npm run governance:drift

      - name: Fail on governance drift
        run: npm run governance:drift:check
