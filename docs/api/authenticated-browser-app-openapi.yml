# Issue #130 standards evidence: mechanical maintainability compaction only; no API contract change.
openapi: 3.1.0
info:
  title: Authenticated Browser App Session API
  version: 0.2.0
  description: |
    Browser auth contract for the authenticated app shell.
    Governance note: browser-shell session and route changes should update this spec in the same pull request.
    Protected browser-shell routes in the current client include `/tasks`, `/tasks?view=board`, `/tasks/create`,
    `/overview/pm`, `/overview/governance`, `/inbox/{role}`, and `/tasks/{taskId}`.
    Production sign-in supports the registration credential flow, with hosted OIDC retained only when explicitly selected.
    The internal browser bootstrap endpoint remains a compatibility fallback for local/internal environments only.
    Preview environments without an approved auth strategy may render a no-login-path configuration state.
    Production supports registration auth, OIDC when explicitly selected, or the explicitly selected temporary internal-bootstrap strategy.
    Production registration requires the browser-visible strategy to be `registration` through `VITE_AUTH_PRODUCTION_AUTH_STRATEGY`
    or injected runtime config `window.__ENGINEERING_TEAM_RUNTIME_CONFIG__.productionAuthStrategy`.
    Public self-service signup is available when registration auth is selected; new accounts remain pending until an admin approves them.
    Its public app URL must be HTTPS, session TTL must be 8 hours, email verification TTL must be 24 hours, and password reset TTL must be 30 minutes.
    Authenticated shell routes present compact primary navigation plus a task-id route utility while preserving first-screen status context on task detail.
    Initial production admin access is seeded out-of-band by the operator-only `npm run auth:admin:seed -- --apply`
    workflow; the browser contract never exposes the seed inputs, database URL, raw email address, or generated session secrets.
paths:
  /sign-in:
    get:
      summary: Browser entry route for registration sign-in
      description: |
        The SPA renders the sign-in screen. Registration deployments show email/password login, public registration, and password reset forms.
        Registration does not require an invite link in the production admin-approved policy.
        The route also accepts `next` and `reason` query parameters for protected-route restore and recovery messaging.
        OIDC deployments start hosted OIDC Authorization Code + PKCE when the user selects the enterprise sign-in action.
        When no configured login path is available, the SPA renders a safe deployment-configuration error without raw env values, provider URLs, client IDs, tokens, authorization codes, or secrets.
      parameters:
        - in: query
          name: next
          schema:
            type: string
          description: In-app route to restore after successful authentication.
        - in: query
          name: reason
          schema:
            type: string
            enum: [expired, signed_out, oidc_error, magic_link_removed]
          description: Optional user-facing recovery reason shown by the SPA.
      responses:
        '200':
          description: Sign-in screen rendered by the browser app.
  /auth/callback:
    get:
      summary: Browser OIDC callback route
      description: |
        The SPA receives the authorization response on this route, validates PKCE state from session storage,
        exchanges the code with the provider token endpoint, stores the returned access token, and restores the queued in-app route.
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: error
          schema:
            type: string
        - in: query
          name: error_description
          schema:
            type: string
      responses:
        '200':
          description: Callback route rendered by the browser app.
  /auth/register:
    post:
      summary: Register a credential account
      description: |
        Creates a credential account according to the configured registration policy and returns generic success for duplicate or ineligible identities where safe.
        The production admin-approved policy allows public signup and creates pending accounts that cannot use the app until admin approval.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                displayName:
                  type: string
                inviteCode:
                  type: string
                  description: Legacy non-production invite-only policy input; not required or shown by the production admin-approved browser signup flow.
      responses:
        '201':
          description: Generic registration response.
        '503':
          description: Registration is disabled for this deployment.
  /auth/login:
    post:
      summary: Create a registration-auth cookie session
      description: Validates email and password, creates an httpOnly session cookie plus readable CSRF cookie, and returns the current principal without exposing credential material.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                next:
                  type: string
                  description: Sanitized same-origin route to restore after sign-in.
      responses:
        '200':
          description: Cookie session created.
        '401':
          description: Generic invalid credentials response.
        '403':
          description: Account requires verification or approval.
        '429':
          description: Login attempts are temporarily throttled.
  /auth/email/verify/request:
    post:
      summary: Request a new email verification token
      responses:
        '200':
          description: Generic email verification response.
  /auth/email/verify/confirm:
    post:
      summary: Confirm an email verification token
      responses:
        '200':
          description: Email verified.
        '401':
          description: Token invalid, expired, or replayed.
  /auth/password-reset/request:
    post:
      summary: Request password reset instructions
      responses:
        '200':
          description: Generic password reset response.
  /auth/password-reset/confirm:
    post:
      summary: Confirm password reset and rotate credentials
      responses:
        '200':
          description: Password reset completed and existing sessions revoked.
        '401':
          description: Token invalid, expired, or replayed.
  /auth/magic-link/request:
    post:
      summary: Removed magic-link request endpoint
      description: Magic-link sign-in is removed after registration cutover.
      responses:
        '410':
          description: Magic-link sign-in has been removed.
  /auth/magic-link/consume:
    get:
      summary: Removed magic-link consume endpoint
      description: Redirects to sign-in with a removed-flow reason and never creates a session.
      responses:
        '302':
          description: Redirects to /sign-in?reason=magic_link_removed.
  /tasks/create:
    get:
      summary: Browser route for creating an intake draft
      description: Renders the protected raw-requirements form. Successful submission posts to the audit task API and restores the created task detail route.
      responses:
        '200':
          description: Intake draft creation screen rendered by the browser app for authenticated users.
  /auth/me:
    get:
      summary: Return the current browser auth principal
      responses:
        '200':
          description: Current actor, tenant, roles, auth type, and expiry.
        '401':
          description: No valid browser session.
  /auth/logout:
    post:
      summary: Revoke the current cookie session and clear auth cookies
      responses:
        '200':
          description: Session revoked or already absent.
  /auth/session:
    post:
      summary: Exchange a trusted internal browser auth code for a browser JWT session
      description: |
        Compatibility-only local/internal fallback.
        This endpoint should be disabled in production with `AUTH_ENABLE_INTERNAL_BROWSER_BOOTSTRAP=false`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authCode
              properties:
                authCode:
                  type: string
                  description: Signed browser bootstrap artifact from the trusted internal auth source.
      responses:
        '200':
          description: Compatibility session created.
        '400':
          description: Missing authCode.
        '401':
          description: Invalid, expired, or untrusted auth bootstrap code.
        '404':
          description: Internal browser auth bootstrap disabled in this environment.
  /api/auth/session:
    post:
      summary: Compatibility alias for the internal browser bootstrap endpoint
      responses:
        '200':
          description: Same contract as POST /auth/session.
