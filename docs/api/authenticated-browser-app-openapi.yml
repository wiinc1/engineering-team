openapi: 3.1.0
info:
  title: Authenticated Browser App Session API
  version: 0.2.0
  description: |
    Browser auth contract for the authenticated app shell.
    Governance note: browser-shell session and route changes should update this spec in the same pull request.
    Protected browser-shell routes in the current client include `/tasks`, `/tasks?view=board`, `/tasks/create`,
    `/overview/pm`, `/overview/governance`, `/inbox/{role}`, and `/tasks/{taskId}`.
    Production sign-in supports hosted OIDC Authorization Code + PKCE or first-party invite-only magic-link sessions.
    The internal browser bootstrap endpoint remains a compatibility fallback for local/internal environments only.
    Preview environments without an approved auth strategy may render a no-login-path configuration state.
    Production supports OIDC, durable magic-link auth when no IdP exists, or the explicitly selected temporary internal-bootstrap strategy.
    Production magic-link requires the browser-visible strategy to be `magic-link` through `VITE_AUTH_PRODUCTION_AUTH_STRATEGY`
    or injected runtime config `window.__ENGINEERING_TEAM_RUNTIME_CONFIG__.productionAuthStrategy`.
    Its public app URL must be HTTPS, magic-link TTL must be 15 minutes, and session TTL must be 8 hours.
paths:
  /sign-in:
    get:
      summary: Browser entry route for enterprise sign-in
      description: |
        The SPA renders the sign-in screen and starts hosted OIDC Authorization Code + PKCE when the user selects the enterprise sign-in action.
        The route also accepts `next` and `reason` query parameters for protected-route restore and recovery messaging.
        When no configured login path is available, the SPA renders a safe deployment-configuration error without raw env values, provider URLs, client IDs, tokens, authorization codes, or secrets.
      parameters:
        - in: query
          name: next
          schema:
            type: string
          description: In-app route to restore after successful authentication.
        - in: query
          name: reason
          schema:
            type: string
            enum: [expired, signed_out, oidc_error]
          description: Optional user-facing recovery reason shown by the SPA.
      responses:
        '200':
          description: Sign-in screen rendered by the browser app.
  /auth/callback:
    get:
      summary: Browser OIDC callback route
      description: |
        The SPA receives the authorization response on this route, validates PKCE state from session storage,
        exchanges the code with the provider token endpoint, stores the returned access token, and restores the queued in-app route.
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: error
          schema:
            type: string
        - in: query
          name: error_description
          schema:
            type: string
      responses:
        '200':
          description: Callback route rendered by the browser app.
  /auth/magic-link/request:
    post:
      summary: Request an invite-only magic sign-in link
      description: Returns generic success for eligible, unknown, inactive, and throttled identities where safe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                next:
                  type: string
                  description: Sanitized same-origin route to restore after sign-in.
      responses:
        '200':
          description: Generic magic-link request response.
  /auth/magic-link/consume:
    get:
      summary: Consume a single-use magic-link token
      description: Creates an httpOnly cookie session, sets a readable CSRF cookie, and redirects to the sanitized next route.
      parameters:
        - in: query
          name: token
          schema:
            type: string
        - in: query
          name: next
          schema:
            type: string
      responses:
        '302':
          description: Redirects to the restored browser route or back to sign-in on failure.
  /tasks/create:
    get:
      summary: Browser route for creating an intake draft
      description: Renders the protected raw-requirements form. Successful submission posts to the audit task API and restores the created task detail route.
      responses:
        '200':
          description: Intake draft creation screen rendered by the browser app for authenticated users.
  /auth/me:
    get:
      summary: Return the current browser auth principal
      responses:
        '200':
          description: Current actor, tenant, roles, auth type, and expiry.
        '401':
          description: No valid browser session.
  /auth/logout:
    post:
      summary: Revoke the current cookie session and clear auth cookies
      responses:
        '200':
          description: Session revoked or already absent.
  /auth/session:
    post:
      summary: Exchange a trusted internal browser auth code for a browser JWT session
      description: |
        Compatibility-only local/internal fallback.
        This endpoint should be disabled in production with `AUTH_ENABLE_INTERNAL_BROWSER_BOOTSTRAP=false`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authCode
              properties:
                authCode:
                  type: string
                  description: Signed browser bootstrap artifact from the trusted internal auth source.
      responses:
        '200':
          description: Compatibility session created.
        '400':
          description: Missing authCode.
        '401':
          description: Invalid, expired, or untrusted auth bootstrap code.
        '404':
          description: Internal browser auth bootstrap disabled in this environment.
  /api/auth/session:
    post:
      summary: Compatibility alias for the internal browser bootstrap endpoint
      responses:
        '200':
          description: Same contract as POST /auth/session.
