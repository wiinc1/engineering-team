# Issue #130 standards evidence: mechanical maintainability compaction only; no API contract change.
openapi: 3.0.3
info:
  title: Canonical Task Platform API
  version: 0.2.0
  description: |
    Versioned API contract for canonical task persistence, AI agent ownership, and merge-readiness reviews.
    `/api/v1` is the canonical task-platform read/write path for production, staging, and standard local development.
    Audit-backed `/tasks/...` routes remain compatibility adapters during the migration window.
servers:
  - url: /api/v1
paths:
  /ai-agents:
    get:
      summary: List canonical AI agents that can own tasks
      operationId: listAiAgents
      tags: [AI Agents]
      security:
        - BearerAuth: []
      parameters:
        - name: includeInactive
          in: query
          description: Defaults to false and returns only active assignable agents for assignment controls. Set true for operator management views that need inactive or non-assignable records.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Canonical AI agent registry
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiAgent'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create an operator-managed AI agent
      operationId: createAiAgent
      tags: [AI Agents]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAiAgentRequest'
      responses:
        '201':
          description: AI agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAgentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /ai-agents/{agentId}:
    patch:
      summary: Update or deactivate an operator-managed AI agent
      operationId: updateAiAgent
      tags: [AI Agents]
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z][a-z0-9-]{1,63}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiAgentRequest'
      responses:
        '200':
          description: AI agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAgentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /projects:
    get:
      summary: List Projects for the caller tenant
      operationId: listProjects
      tags: [Projects]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Tenant-scoped Project list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a Project planning container
      operationId: createProject
      tags: [Projects]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /projects/{projectId}:
    get:
      summary: Fetch a Project with its task memberships
      operationId: getProject
      tags: [Projects]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update Project metadata with optimistic concurrency
      operationId: updateProject
      tags: [Projects]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /tasks:
    get:
      summary: List canonical task records
      operationId: listTasks
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - name: ownerAgentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a canonical task
      operationId: createTask
      tags: [Tasks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /tasks/{taskId}:
    get:
      summary: Fetch a canonical task by id
      operationId: getTask
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update mutable task fields using optimistic concurrency
      operationId: updateTask
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /tasks/{taskId}/owner:
    patch:
      summary: Assign, reassign, or clear task ownership
      operationId: updateTaskOwner
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskOwnerRequest'
      responses:
        '200':
          description: Task owner updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /tasks/{taskId}/project:
    patch:
      summary: Attach a task to a Project or detach it with optimistic concurrency
      operationId: updateTaskProject
      tags: [Projects, Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskProjectRequest'
      responses:
        '200':
          description: Task Project membership updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /tasks/{taskId}/merge-readiness-reviews:
    get:
      summary: List merge readiness reviews for a canonical task
      operationId: listTaskMergeReadinessReviews
      tags: [Merge Readiness Reviews]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: repository
          in: query
          schema:
            type: string
        - name: pullRequestNumber
          in: query
          schema:
            type: integer
        - name: commitSha
          in: query
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{7,40}$'
        - name: current
          in: query
          description: Defaults to true. Set false to include historical superseded reviews.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Merge readiness review records for the requested Task and optional PR identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeReadinessReviewListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create a merge readiness review, supersede any current review for the same PR identity, and refresh the GitHub Merge readiness check when a check client is configured
      operationId: createTaskMergeReadinessReview
      tags: [Merge Readiness Reviews]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMergeReadinessReviewRequest'
      responses:
        '201':
          description: Merge readiness review created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MergeReadinessReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      summary: Update mutable merge readiness review fields with optimistic concurrency
      operationId: updateTaskMergeReadinessReview
      tags: [Merge Readiness Reviews]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMergeReadinessReviewRequest'
      responses:
        '200':
          description: Merge readiness review updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MergeReadinessReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        pattern: '^PRJ-[A-Z0-9]{8}$'
  schemas:
    AiAgent:
      type: object
      required: [agentId, displayName, role, active, assignable, version]
      properties:
        agentId:
          type: string
          pattern: '^[a-z][a-z0-9-]{1,63}$'
        displayName:
          type: string
        role:
          type: string
          enum: [pm, architect, engineer, qa, sre, human]
        description:
          type: string
          nullable: true
        executionKind:
          type: string
        active:
          type: boolean
        assignable:
          type: boolean
        environmentScope:
          type: string
        metadata:
          type: object
          additionalProperties: true
        version:
          type: integer
          minimum: 1
        createdByActorId:
          type: string
          nullable: true
        updatedByActorId:
          type: string
          nullable: true
    AiAgentEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AiAgent'
    CreateAiAgentRequest:
      type: object
      required: [agentId, displayName, role]
      properties:
        agentId:
          type: string
          pattern: '^[a-z][a-z0-9-]{1,63}$'
        displayName:
          type: string
        role:
          type: string
          enum: [pm, architect, engineer, qa, sre, human]
        description:
          type: string
        executionKind:
          type: string
          default: software-factory
          description: Execution backend/category for the agent. Defaults to `software-factory`.
        environmentScope:
          type: string
          default: default
          description: Environment or workspace scope where the agent may run. Defaults to `default`.
        assignable:
          type: boolean
          default: true
          description: Whether the agent can be selected as a task owner. Inactive agents are forced to non-assignable.
        active:
          type: boolean
          default: true
          description: Whether the agent is active. Creating an inactive agent forces `assignable=false`.
        metadata:
          type: object
          additionalProperties: true
    UpdateAiAgentRequest:
      type: object
      required: [version]
      properties:
        version:
          type: integer
          minimum: 1
          description: Optimistic concurrency token from the current AiAgent record.
        displayName:
          type: string
        role:
          type: string
          enum: [pm, architect, engineer, qa, sre, human]
        description:
          type: string
          nullable: true
        assignable:
          type: boolean
        active:
          type: boolean
          description: Set false to deactivate. Deactivation also removes assignability. Reactivation requires a normal versioned PATCH and does not automatically restore assignability unless `assignable:true` is supplied.
        metadata:
          type: object
          additionalProperties: true
    TaskOwner:
      type: object
      nullable: true
      required: [agentId, displayName, active, assignable]
      properties:
        agentId:
          type: string
        displayName:
          type: string
        role:
          type: string
          nullable: true
        active:
          type: boolean
        assignable:
          type: boolean
    ProjectStatus:
      type: string
      enum: [PLANNING, ACTIVE, PAUSED, COMPLETED, ARCHIVED]
    ProjectSummary:
      type: object
      nullable: true
      required: [projectId, name, status, href]
      properties:
        projectId:
          type: string
          pattern: '^PRJ-[A-Z0-9]{8}$'
        name:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        href:
          type: string
    Project:
      type: object
      required: [projectId, name, status, taskCount, version, createdAt, updatedAt]
      properties:
        projectId:
          type: string
          pattern: '^PRJ-[A-Z0-9]{8}$'
        name:
          type: string
        summary:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerActorId:
          type: string
          nullable: true
        taskCount:
          type: integer
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    ProjectEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Project'
    ProjectsProductionSmokeEvidence:
      type: object
      description: Redacted operator evidence emitted by `npm run projects:production-smoke`.
      required: [summary, api]
      properties:
        summary:
          type: object
          required: [taskFixtureCreated, taskAttached, taskDetached, evidenceRedacted]
          properties:
            taskFixtureCreated:
              type: boolean
              description: True only when the smoke creates its own safe task fixture.
            taskAttached:
              type: boolean
            taskDetached:
              type: boolean
            evidenceRedacted:
              type: boolean
        api:
          type: object
          required: [createTaskStatus, taskFixtureCreated]
          properties:
            createTaskStatus:
              type: integer
              nullable: true
            taskFixtureCreated:
              type: boolean
    Task:
      type: object
      required: [taskId, title, status, version, owner, createdAt, updatedAt]
      properties:
        taskId:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          nullable: true
        version:
          type: integer
        owner:
          $ref: '#/components/schemas/TaskOwner'
        projectId:
          type: string
          nullable: true
          pattern: '^PRJ-[A-Z0-9]{8}$'
        project:
          $ref: '#/components/schemas/ProjectSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
    MergeReadinessReviewStatus:
      type: string
      enum: [pending, passed, blocked, stale, error]
    MergeReadinessReviewJsonValue:
      nullable: true
      description: Evolving JSONB payload. Source logs must be linked from this record, not copied inline. Merge-readiness source inventory is evaluated under `merge-readiness-source-inventory.v1`; branch-protection enforcement is evaluated under `merge-readiness-branch-protection.v1` when verification evidence is supplied or when `ff_merge_readiness_enforcement` targets the PR. Human-facing PR summaries are derived from this structured review under `merge-readiness-pr-summary.v1`; comment text is never the source of truth. Cross-cutting reusable gate checks, including `finding_deferral_policy`, are exercised under `merge-readiness-gate.v1`.
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items:
            type: object
            additionalProperties: true
    MergeReadinessReview:
      type: object
      required:
        - tenantId
        - reviewId
        - taskId
        - repository
        - pullRequestNumber
        - commitSha
        - reviewStatus
        - isCurrent
        - policyVersion
        - recordVersion
        - reviewedLogSources
        - findings
        - reviewerActorId
        - reviewerActorType
        - createdAt
        - updatedAt
      properties:
        tenantId:
          type: string
        reviewId:
          type: string
        taskId:
          type: string
        repository:
          type: string
        pullRequestNumber:
          type: integer
        commitSha:
          type: string
          pattern: '^[0-9a-fA-F]{7,40}$'
        reviewStatus:
          $ref: '#/components/schemas/MergeReadinessReviewStatus'
        isCurrent:
          type: boolean
        policyVersion:
          type: string
        recordVersion:
          type: integer
        githubCheckRunId:
          type: integer
          nullable: true
          description: GitHub check run id for the `Merge readiness` check. It is set after check-run emission when GitHub returns an id.
        sourceInventory:
          description: Required source inventory produced by the source policy. Includes `policy_version`, `status`, `required_sources`, and ignored optional source references.
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        requiredCheckInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewedLogSources:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        findings:
          description: Structured findings used by check-run evaluation and by the derived PR summary. PR comments may render blocking findings, non-blocking findings with rationale, and deferred blockers with approvals, but must not include full logs. Gate-level finding policy distinguishes blocking versus non-blocking findings and requires ownership plus rationale for non-blocking findings.
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        classification:
          description: Includes `branch_protection_policy` when default-branch required status checks are verified. `enforced=true` is valid only when branch protection requires `Merge readiness`; otherwise the policy reports `policy_blocked` or `error`. Includes `finding_deferral_policy` when blocking findings or proposed deferrals are present.
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        owner:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        rationale:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        followUpLinks:
          description: Structured follow-up links that may be rendered in the derived PR summary.
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        approvals:
          description: Structured approvals that may be rendered only for deferred blocking findings in the derived PR summary. Blocking-finding deferral validation requires Product Manager risk acceptance, technical-owner risk acceptance, a follow-up link, explicit deferral policy permission, and Principal/SRE approval for high-risk findings.
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        metadata:
          description: Includes `github_merge_readiness_gate` metadata with `policy_version=merge-readiness-github-check.v1`, evidence fingerprint, check-run id, and invalidation details when the PR commit SHA or evidence changes. Includes `github_merge_readiness_branch_protection` with `policy_version=merge-readiness-branch-protection.v1`, status, branch, required check name, and `enforced` when branch-protection verification runs. Includes `merge_readiness_enforcement` when `ff_merge_readiness_enforcement` activates enforcement for an autonomous workflow PR or all PRs. May include a Structured MergeReadinessReview URL for PR summary rendering; merge readiness evaluation still reads this review record, not comment text.
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewerActorId:
          type: string
        reviewerActorType:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MergeReadinessReviewListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, current]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/MergeReadinessReview'
            current:
              allOf:
                - $ref: '#/components/schemas/MergeReadinessReview'
              nullable: true
              description: The current review from the returned item set, or null.
    CreateTaskRequest:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        ownerAgentId:
          type: string
          nullable: true
        idempotencyKey:
          type: string
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        projectId:
          type: string
          pattern: '^PRJ-[A-Z0-9]{8}$'
        name:
          type: string
          maxLength: 120
        summary:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerActorId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        idempotencyKey:
          type: string
    UpdateProjectRequest:
      type: object
      required: [version]
      properties:
        name:
          type: string
          maxLength: 120
        summary:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerActorId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        version:
          type: integer
        idempotencyKey:
          type: string
    UpdateTaskProjectRequest:
      type: object
      required: [version]
      properties:
        projectId:
          type: string
          nullable: true
          pattern: '^PRJ-[A-Z0-9]{8}$'
          description: Use `null` to detach a task from its Project.
        version:
          type: integer
        idempotencyKey:
          type: string
    UpdateTaskRequest:
      type: object
      required: [version]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          nullable: true
        version:
          type: integer
        idempotencyKey:
          type: string
    UpdateTaskOwnerRequest:
      type: object
      required: [version]
      properties:
        ownerAgentId:
          type: string
          nullable: true
          description: Use `null` to clear assignment.
        version:
          type: integer
        idempotencyKey:
          type: string
    CreateMergeReadinessReviewRequest:
      type: object
      required: [repository, pullRequestNumber, commitSha, reviewStatus]
      properties:
        repository:
          type: string
        pullRequestNumber:
          type: integer
        commitSha:
          type: string
          pattern: '^[0-9a-fA-F]{7,40}$'
        reviewStatus:
          $ref: '#/components/schemas/MergeReadinessReviewStatus'
        isCurrent:
          type: boolean
          default: true
        policyVersion:
          type: string
          default: merge-readiness-review-storage.v1
        githubCheckRunId:
          type: integer
          nullable: true
          description: Existing GitHub `Merge readiness` check run id to update rather than recreate.
        detailsUrl:
          type: string
          description: Optional details URL attached to the emitted GitHub `Merge readiness` check run.
        changedFiles:
          type: array
          description: Changed files used by the source inventory policy to select required review sources.
          items:
            type: string
        requiredChecks:
          type: array
          description: Required GitHub checks or check-like contexts used to require linked check evidence and to fingerprint check-run freshness.
          items:
            type: object
            additionalProperties: true
        executionContractEvidence:
          type: array
          description: Execution Contract evidence expectations that become required inventory entries.
          items:
            type: object
            additionalProperties: true
        previewDeployment:
          type: object
          description: Preview presence that requires linked preview evidence and can invalidate stale merge-readiness checks when it changes.
          additionalProperties: true
        deployment:
          type: object
          description: Deployment presence that requires deployment and runtime observability evidence and can invalidate stale merge-readiness checks when it changes.
          additionalProperties: true
        riskFlags:
          type: array
          description: Risk flags such as `security`, `deployment`, `migration`, `accessibility`, or `performance` that add required evidence sources.
          items:
            type: string
        availableSources:
          type: array
          description: Linked evidence sources available to satisfy the required source inventory.
          items:
            type: object
            additionalProperties: true
        optionalSources:
          type: array
          description: Linked logs outside the required inventory. These remain optional and do not require human review.
          items:
            type: object
            additionalProperties: true
        evidenceAccess:
          type: object
          description: Per-source access status. Inaccessible required evidence sets review status to `error`; configuration or permission failures raise `policy_blocked`.
          additionalProperties: true
        branchProtection:
          type: object
          description: Default-branch protection evidence from GitHub. Required status checks must include `Merge readiness` before the control plane represents the gate as enforced. Missing or unreadable evidence reports `policy_blocked` or `error`; this field is verification evidence only and does not mutate GitHub settings.
          additionalProperties: true
        autonomousWorkflowPr:
          type: boolean
          description: Marks this review as an autonomous workflow PR. When `ff_merge_readiness_enforcement` is enabled and the target is autonomous PRs, branch-protection verification is required before merge readiness can pass.
        enforceMergeReadiness:
          type: boolean
          description: Explicit per-review enforcement override. When true and the feature flag is enabled, branch-protection verification is required even if the PR is not tagged as autonomous.
        sourceInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        requiredCheckInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewedLogSources:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        findings:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        classification:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        owner:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        rationale:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        followUpLinks:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        approvals:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        metadata:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewerActorId:
          type: string
        reviewerActorType:
          type: string
    UpdateMergeReadinessReviewRequest:
      type: object
      required: [reviewId, recordVersion]
      properties:
        reviewId:
          type: string
        recordVersion:
          type: integer
        reviewStatus:
          $ref: '#/components/schemas/MergeReadinessReviewStatus'
        policyVersion:
          type: string
        githubCheckRunId:
          type: integer
          nullable: true
          description: Existing GitHub `Merge readiness` check run id to update rather than recreate.
        detailsUrl:
          type: string
          description: Optional details URL attached to the emitted GitHub `Merge readiness` check run.
        sourceInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        requiredCheckInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewedLogSources:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        findings:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        classification:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        owner:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        rationale:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        followUpLinks:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        approvals:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        metadata:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewerActorId:
          type: string
        reviewerActorType:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Caller lacks permission for this mutation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Optimistic concurrency or uniqueness conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
