# Issue #130 standards evidence: mechanical maintainability compaction only; no API contract change.
openapi: 3.0.3
info:
  title: Canonical Task Platform API
  version: 0.2.0
  description: |
    Implemented additive versioned API contract for the canonical task persistence and AI agent ownership architecture.
    This is additive to the current audit-backed `/tasks/...` routes and is the live runtime contract for the Issue #30 rollout path.
servers:
  - url: /api/v1
paths:
  /ai-agents:
    get:
      summary: List canonical AI agents that can own tasks
      operationId: listAiAgents
      tags: [AI Agents]
      security:
        - BearerAuth: []
      parameters:
        - name: includeInactive
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Canonical AI agent registry
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiAgent'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /tasks:
    get:
      summary: List canonical task records
      operationId: listTasks
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - name: ownerAgentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a canonical task
      operationId: createTask
      tags: [Tasks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /tasks/{taskId}:
    get:
      summary: Fetch a canonical task by id
      operationId: getTask
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update mutable task fields using optimistic concurrency
      operationId: updateTask
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /tasks/{taskId}/owner:
    patch:
      summary: Assign, reassign, or clear task ownership
      operationId: updateTaskOwner
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskOwnerRequest'
      responses:
        '200':
          description: Task owner updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /tasks/{taskId}/merge-readiness-reviews:
    get:
      summary: List merge readiness reviews for a canonical task
      operationId: listTaskMergeReadinessReviews
      tags: [Merge Readiness Reviews]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: repository
          in: query
          schema:
            type: string
        - name: pullRequestNumber
          in: query
          schema:
            type: integer
        - name: commitSha
          in: query
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{7,40}$'
        - name: current
          in: query
          description: Defaults to true. Set false to include historical superseded reviews.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Merge readiness review records for the requested Task and optional PR identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeReadinessReviewListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create a merge readiness review and supersede any current review for the same PR identity
      operationId: createTaskMergeReadinessReview
      tags: [Merge Readiness Reviews]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMergeReadinessReviewRequest'
      responses:
        '201':
          description: Merge readiness review created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MergeReadinessReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      summary: Update mutable merge readiness review fields with optimistic concurrency
      operationId: updateTaskMergeReadinessReview
      tags: [Merge Readiness Reviews]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMergeReadinessReviewRequest'
      responses:
        '200':
          description: Merge readiness review updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MergeReadinessReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
  schemas:
    AiAgent:
      type: object
      required: [agentId, displayName, active, assignable]
      properties:
        agentId:
          type: string
        displayName:
          type: string
        role:
          type: string
          nullable: true
        executionKind:
          type: string
        active:
          type: boolean
        assignable:
          type: boolean
        environmentScope:
          type: string
    TaskOwner:
      type: object
      nullable: true
      required: [agentId, displayName, active, assignable]
      properties:
        agentId:
          type: string
        displayName:
          type: string
        role:
          type: string
          nullable: true
        active:
          type: boolean
        assignable:
          type: boolean
    Task:
      type: object
      required: [taskId, title, status, version, owner, createdAt, updatedAt]
      properties:
        taskId:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          nullable: true
        version:
          type: integer
        owner:
          $ref: '#/components/schemas/TaskOwner'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
    MergeReadinessReviewStatus:
      type: string
      enum: [pending, passed, blocked, stale, error]
    MergeReadinessReviewJsonValue:
      nullable: true
      description: Evolving JSONB payload. Source logs must be linked from this record, not copied inline.
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items:
            type: object
            additionalProperties: true
    MergeReadinessReview:
      type: object
      required:
        - tenantId
        - reviewId
        - taskId
        - repository
        - pullRequestNumber
        - commitSha
        - reviewStatus
        - isCurrent
        - policyVersion
        - recordVersion
        - reviewedLogSources
        - findings
        - reviewerActorId
        - reviewerActorType
        - createdAt
        - updatedAt
      properties:
        tenantId:
          type: string
        reviewId:
          type: string
        taskId:
          type: string
        repository:
          type: string
        pullRequestNumber:
          type: integer
        commitSha:
          type: string
          pattern: '^[0-9a-fA-F]{7,40}$'
        reviewStatus:
          $ref: '#/components/schemas/MergeReadinessReviewStatus'
        isCurrent:
          type: boolean
        policyVersion:
          type: string
        recordVersion:
          type: integer
        githubCheckRunId:
          type: integer
          nullable: true
        sourceInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        requiredCheckInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewedLogSources:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        findings:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        classification:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        owner:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        rationale:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        followUpLinks:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        approvals:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        metadata:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewerActorId:
          type: string
        reviewerActorType:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MergeReadinessReviewListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, current]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/MergeReadinessReview'
            current:
              allOf:
                - $ref: '#/components/schemas/MergeReadinessReview'
              nullable: true
              description: The current review from the returned item set, or null.
    CreateTaskRequest:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        ownerAgentId:
          type: string
          nullable: true
        idempotencyKey:
          type: string
    UpdateTaskRequest:
      type: object
      required: [version]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          nullable: true
        version:
          type: integer
        idempotencyKey:
          type: string
    UpdateTaskOwnerRequest:
      type: object
      required: [version]
      properties:
        ownerAgentId:
          type: string
          nullable: true
          description: Use `null` to clear assignment.
        version:
          type: integer
        idempotencyKey:
          type: string
    CreateMergeReadinessReviewRequest:
      type: object
      required: [repository, pullRequestNumber, commitSha, reviewStatus]
      properties:
        repository:
          type: string
        pullRequestNumber:
          type: integer
        commitSha:
          type: string
          pattern: '^[0-9a-fA-F]{7,40}$'
        reviewStatus:
          $ref: '#/components/schemas/MergeReadinessReviewStatus'
        isCurrent:
          type: boolean
          default: true
        policyVersion:
          type: string
          default: merge-readiness-review-storage.v1
        githubCheckRunId:
          type: integer
          nullable: true
        sourceInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        requiredCheckInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewedLogSources:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        findings:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        classification:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        owner:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        rationale:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        followUpLinks:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        approvals:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        metadata:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewerActorId:
          type: string
        reviewerActorType:
          type: string
    UpdateMergeReadinessReviewRequest:
      type: object
      required: [reviewId, recordVersion]
      properties:
        reviewId:
          type: string
        recordVersion:
          type: integer
        reviewStatus:
          $ref: '#/components/schemas/MergeReadinessReviewStatus'
        policyVersion:
          type: string
        githubCheckRunId:
          type: integer
          nullable: true
        sourceInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        requiredCheckInventory:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewedLogSources:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        findings:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        classification:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        owner:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        rationale:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        followUpLinks:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        approvals:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        metadata:
          $ref: '#/components/schemas/MergeReadinessReviewJsonValue'
        reviewerActorId:
          type: string
        reviewerActorType:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Caller lacks permission for this mutation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Optimistic concurrency or uniqueness conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
