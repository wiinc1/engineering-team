openapi: 3.1.0
info:
  title: Audit Foundation API
  version: 0.1.0
  description: |
    Canonical audit and workflow HTTP contract.
    The task-list projection now also carries additive queue/WIP metadata, optional SRE monitoring preview data, and close-governance escalation previews used by the human decision inbox.
    Human close decisions are accepted only when governed close review is decision-ready: either both PM and Architect cancellation recommendations exist or an active human escalation is present.
    Close-review backtrack now uses a dual-party agreement handshake: the first PM/Architect request records a recommendation and the counterpart request completes the stage change to `IMPLEMENTATION`.
    SRE monitoring runtime accepts both `ff_sre_monitoring` and `ff-sre-monitoring` as equivalent feature-flag names.
    The shared feature-flag helper also treats `FF_REAL_SPECIALIST_DELEGATION` as the canonical specialist-delegation rollout key while still accepting `FF_SPECIALIST_DELEGATION` as a legacy alias.
    Expired monitoring escalations are materialized by background worker processing (`processExpiredSreMonitoring`) rather than read-side mutation.
    `POST /tasks` now accepts raw operator intake requirements and records `task.refinement_requested` to route Intake Drafts to Product Manager refinement without claiming implementation has started. Incomplete intake creation records `task.intake_creation_failed` when a compensating audit event can be written.
    Execution Contract refinement is additive behind `ff_execution_contracts`: `POST /tasks/{id}/execution-contract` records structured, versioned `task.execution_contract_version_recorded` Task data from an Intake Draft; validation records `task.execution_contract_validated`; Markdown generation records `task.execution_contract_markdown_generated` as a non-authoritative view; approval records `task.execution_contract_approved` only after deterministic reviewer routing, required role approvals, and blocking-question gates pass, then commits only the structured `committed_scope.committed_requirements`. Low-risk Simple contracts may request `autoApproval`, which records Operator Approval by `execution-contract-low-risk-simple-auto-approval.v1` only when acceptance criteria are complete, no risk flags or unresolved dependencies exist, no production auth/security/data-model paths are present, and rollback is clear; blocked policy requests return `execution_contract_auto_approval_blocked` and still require explicit Operator Approval. Verification report skeleton generation records `task.execution_contract_verification_report_generated` under `docs/reports/` from approved-contract evidence; Standard-or-higher contracts and Simple contracts with risk flags block implementation dispatch until the skeleton exists, while Simple contracts without risk flags keep the skeleton optional. Dispatch readiness also includes `execution-contract-dispatch-policy.v1`, which selects Jr, Sr, or Principal Engineer from tier, risk, and contract signals; blocks unsafe Jr assignments without a clear test plan; requires Principal review/involvement for Principal triggers; and exposes QA parallel-dispatch eligibility. Contract Coverage Audit records `task.contract_coverage_audit_submitted` and `task.contract_coverage_audit_validated` as structured Task data under `execution-contract-coverage-audit.v1`; the Engineer must submit rows versioned to the approved Execution Contract and current implementation attempt before entering Contract Coverage Audit, QA must close the gate before QA Verification, `implementation_incomplete` blocks QA Verification and Operator Closeout, Markdown coverage is generated for `docs/reports/`, and outcomes update `feature_contract_coverage_audits_submitted_total`, `feature_contract_coverage_audits_closed_total`, `feature_contract_coverage_implementation_incomplete_total`, plus autonomy-confidence metrics including `feature_autonomy_confidence_positive_signals_total`, `feature_autonomy_confidence_neutral_signals_total`, `feature_autonomy_confidence_negative_signals_total`, and `feature_autonomy_confidence_signal_score`. Repo artifact generation then records `task.execution_contract_artifact_bundle_generated` as a reviewable bundle with display-ID user-story and Refinement Decision Log paths; commit readiness requires `task.execution_contract_artifact_bundle_approved`, otherwise `artifact_bundle_approval_blocked` reports missing PM, section-owner, or exception-triggered operator approvals. GitHub issue creation is default-off unless explicitly requested. `feature_operator_trusted_autonomous_delivery_rate` measures auto-approved contracts that later close successfully.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
    ActorHeader:
      name: x-actor-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
  schemas:
    OwnerSummary:
      type: [object, 'null']
      properties:
        actor_id: { type: string }
        display_name: { type: string }
    TaskSummaryResponse:
      type: object
      required: [task_id, tenant_id, title, current_stage, current_owner, owner, blocked, closed, freshness]
      properties:
        task_id: { type: string }
        tenant_id: { type: string }
        title: { type: string }
        priority: { type: [string, 'null'] }
        current_stage: { type: [string, 'null'] }
        current_owner: { type: [string, 'null'] }
        owner:
          $ref: '#/components/schemas/OwnerSummary'
        blocked: { type: boolean }
        closed: { type: boolean }
        queue_entered_at: { type: [string, 'null'], format: date-time }
        wip_owner: { type: [string, 'null'] }
        wip_started_at: { type: [string, 'null'], format: date-time }
        intake_draft: { type: boolean }
        operator_intake_requirements: { type: [string, 'null'] }
        execution_contract:
          $ref: '#/components/schemas/ExecutionContractProjection'
        waiting_state: { type: [string, 'null'] }
        next_required_action: { type: [string, 'null'] }
        freshness:
          type: object
          properties:
            status: { type: string }
            last_updated_at: { type: [string, 'null'], format: date-time }
        monitoring:
          type: [object, 'null']
          additionalProperties: true
          description: Optional SRE monitoring preview used by the `/inbox/sre` dashboard rows.
    TaskListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummaryResponse'
    IntakeDraftCreateRequest:
      type: object
      required: [raw_requirements]
      properties:
        raw_requirements:
          type: string
          minLength: 1
          description: Raw operator-authored initial requirements. This is the only required field for an Intake Draft.
        title:
          type: string
          maxLength: 120
          description: Optional title. Omit or leave blank to use `Untitled intake draft`.
        idempotencyKey: { type: string }
    LegacyTaskCreateRequest:
      type: object
      required: [title, business_context, acceptance_criteria, definition_of_done, priority, task_type]
      properties:
        title: { type: string }
        business_context: { type: string }
        acceptance_criteria: { type: string }
        definition_of_done: { type: string }
        priority: { type: string }
        task_type: { type: string }
        idempotencyKey: { type: string }
    TaskCreateResponse:
      type: object
      required: [taskId, status, intakeDraft, nextRequiredAction, createdAt]
      properties:
        taskId: { type: string }
        status: { type: string, enum: [DRAFT] }
        intakeDraft: { type: boolean }
        nextRequiredAction: { type: [string, 'null'] }
        refinementEventId: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    ExecutionContractSection:
      type: object
      description: Structured section record. Material changes include body, owner/approval metadata, payload schema version, payload JSON, and provenance references.
      required: [id, title, body, owner, owner_role, section_status, approval_status, payload_schema_version, payload_json, provenance_references, required]
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        owner: { type: string, enum: [pm] }
        owner_role: { type: string }
        section_status: { type: string }
        contributor: { type: [string, 'null'] }
        contributors:
          type: array
          items: { type: string }
        approver: { type: [string, 'null'] }
        approvals:
          type: array
          items: { type: string }
        approval_status: { type: string }
        payload_schema_version: { type: integer }
        payload_json:
          type: object
          additionalProperties: true
        provenance_references:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        required: { type: boolean }
    ExecutionContractValidation:
      type: object
      required: [status, requiredSections, missingFields, missingSections, completeSections]
      properties:
        status: { type: string, enum: [valid, invalid] }
        templateTier: { type: [string, 'null'], enum: [Simple, Standard, Complex, Epic, null] }
        requiredSections:
          type: array
          items: { type: string }
        missingFields:
          type: array
          items: { type: string }
        missingSections:
          type: array
          items: { type: string }
        completeSections:
          type: array
          items: { type: string }
    ExecutionContractReviewer:
      type: object
      required: [role, label, required, approvalRequired, status, approved, ruleRequired, modelRequired, downgraded, reasons]
      properties:
        role: { type: string, enum: [pm, architect, ux, qa, sre, principalEngineer] }
        label: { type: string }
        required: { type: boolean }
        approvalRequired: { type: boolean }
        status: { type: string }
        approved: { type: boolean }
        actorId: { type: [string, 'null'] }
        ruleRequired: { type: boolean }
        modelRequired: { type: boolean }
        downgraded: { type: boolean }
        downgradeRationale: { type: [string, 'null'] }
        reasons:
          type: array
          items:
            type: object
            required: [source, code, detail, risk_flags]
            properties:
              source: { type: string }
              code: { type: string }
              detail: { type: string }
              risk_flags:
                type: array
                items: { type: string }
    ExecutionContractReviewerRouting:
      type: object
      required: [policy_version, template_tier, risk_flags, resolution_order, required_reviewers, required_role_approvals, downgrade_rationales, reviewers]
      properties:
        policy_version: { type: string, enum: [execution-contract-reviewer-routing.v1] }
        template_tier: { type: string, enum: [Simple, Standard, Complex, Epic] }
        risk_flags:
          type: array
          items:
            type: object
            required: [id, label, source]
            properties:
              id: { type: string }
              label: { type: string }
              source: { type: string }
        resolution_order:
          type: array
          items: { type: string, enum: [deterministic_rules, model_judgment, pm_downgrade_rationale] }
        required_reviewers:
          type: array
          items: { type: string }
        required_role_approvals:
          type: array
          items: { type: string }
        downgrade_rationales:
          type: array
          items:
            type: object
            additionalProperties: true
        reviewers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ExecutionContractReviewer'
    ExecutionContractApprovalSummary:
      type: object
      required: [policy_version, status, canApprove, requiredReviewers, requiredRoleApprovals, missingRequiredApprovals, unresolvedBlockingQuestions, nonBlockingComments, downgradeRationales]
      properties:
        policy_version: { type: string, enum: [execution-contract-approval-gates.v1] }
        status: { type: string, enum: [ready, blocked] }
        canApprove: { type: boolean }
        requiredReviewers:
          type: array
          items: { type: string }
        requiredRoleApprovals:
          type: array
          items: { type: string }
        missingRequiredApprovals:
          type: array
          items:
            type: object
            additionalProperties: true
        unresolvedBlockingQuestions:
          type: array
          items:
            type: object
            additionalProperties: true
        nonBlockingComments:
          type: array
          items:
            type: object
            additionalProperties: true
        downgradeRationales:
          type: array
          items:
            type: object
            additionalProperties: true
    ExecutionContractAutoApprovalPolicy:
      type: object
      required: [policy_version, status, canAutoApprove, operatorApprovalRequired, rationale, criteria, blockingReasons, metricsPolicy]
      properties:
        policy_version: { type: string, enum: [execution-contract-low-risk-simple-auto-approval.v1] }
        status: { type: string, enum: [ready, blocked] }
        canAutoApprove: { type: boolean }
        operatorApprovalRequired: { type: boolean }
        rationale: { type: string }
        criteria:
          type: object
          additionalProperties: true
          description: Evaluated Simple-tier, acceptance-criteria, risk-flag, dependency, sensitive-path, rollback, and reviewer-gate criteria.
        blockingReasons:
          type: array
          items:
            type: object
            additionalProperties: true
        metricsPolicy:
          type: object
          additionalProperties: true
    ExecutionContractAutoApprovalRecord:
      type: object
      required: [policy_version, approved_by_policy, approval_mode, approved_at, rationale, criteria, metrics_policy]
      properties:
        policy_version: { type: string, enum: [execution-contract-low-risk-simple-auto-approval.v1] }
        approved_by_policy: { type: boolean, enum: [true] }
        approval_mode: { type: string, enum: [policy] }
        approved_at: { type: string, format: date-time }
        recorded_by: { type: [string, 'null'] }
        rationale: { type: string }
        criteria:
          type: object
          additionalProperties: true
        metrics_policy:
          type: object
          additionalProperties: true
    ExecutionContract:
      type: object
      required: [contract_id, task_id, version, tier, status, template_tier, template_source, owner, authoritative, source_intake_revision, required_sections, sections, risk_flags, reviewer_routing, reviewers, review_feedback, committed_scope, validation]
      properties:
        contract_id: { type: string }
        task_id: { type: string }
        version: { type: integer, minimum: 1 }
        tier: { type: string, enum: [Simple, Standard, Complex, Epic] }
        status: { type: string }
        template_tier: { type: string, enum: [Simple, Standard, Complex, Epic] }
        template_source: { type: string, enum: [docs/templates/USER_STORY_TEMPLATE.md] }
        owner: { type: string, enum: [pm] }
        authoritative: { type: boolean, enum: [true] }
        creator: { type: [string, 'null'] }
        approver: { type: [string, 'null'] }
        approval_timestamp: { type: [string, 'null'], format: date-time }
        source_intake_revision:
          type: object
          additionalProperties: true
        generated_from:
          type: object
          additionalProperties: true
        required_sections:
          type: array
          items: { type: string }
        sections:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ExecutionContractSection'
        risk_flags:
          type: array
          items:
            type: object
            additionalProperties: true
        reviewer_routing:
          $ref: '#/components/schemas/ExecutionContractReviewerRouting'
        reviewers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ExecutionContractReviewer'
        review_feedback:
          type: object
          required: [policy_version, questions, comments]
          properties:
            policy_version: { type: string }
            questions:
              type: array
              items:
                type: object
                additionalProperties: true
            comments:
              type: array
              items:
                type: object
                additionalProperties: true
        dispatch_signals:
          type: object
          additionalProperties: true
          description: Contract-level dispatch hints such as `workCategory`, `clearTestPlan`, `proposedEngineerTier`, `qaCoverageApplicable`, and explicit Principal escalation triggers. These signals are material contract inputs.
        auto_approval_signals:
          type: object
          additionalProperties: true
          description: Material auto-approval evidence such as rollback path, unresolved dependency declarations, and production-sensitive path declarations.
        approval_mode:
          type: [string, 'null']
          enum: [explicit, policy, null]
        auto_approval:
          oneOf:
            - $ref: '#/components/schemas/ExecutionContractAutoApprovalRecord'
            - type: 'null'
        committed_scope:
          type: object
          required: [commitment_status, committed_requirements, out_of_scope, deferred_considerations, follow_up_tasks, exclusion_policy]
          properties:
            commitment_status: { type: string, enum: [pending_approval, committed] }
            committed_requirements:
              type: array
              items:
                type: object
                additionalProperties: true
            out_of_scope:
              type: array
              items:
                type: object
                additionalProperties: true
            deferred_considerations:
              type: array
              items:
                type: object
                additionalProperties: true
            follow_up_tasks:
              type: array
              items:
                type: object
                additionalProperties: true
            exclusion_policy: { type: string }
        validation:
          $ref: '#/components/schemas/ExecutionContractValidation'
        material_hash: { type: string }
    ExecutionContractArtifactBundle:
      type: object
      required: [policy_version, bundle_id, display_id, environment, slug, contract_version, status, generated_artifacts, links, pr_guidance, approval_routing, approval_summary, commit_policy]
      properties:
        policy_version: { type: string, enum: [execution-contract-artifact-bundle.v1] }
        bundle_id: { type: string }
        display_id:
          type: string
          description: Production bundles use `TSK-123`; staging/local bundles use aliases such as `STG-123` or `LOCAL-123` to avoid collision.
        environment: { type: string, enum: [production, staging, local] }
        slug: { type: string }
        contract_version: { type: integer }
        status: { type: string, enum: [pending_approval, approved_for_commit] }
        generated_artifacts:
          type: object
          required: [user_story, refinement_decision_log]
          properties:
            user_story:
              type: object
              required: [path, content, immutable_after_approval]
              properties:
                path: { type: string }
                content: { type: string }
                immutable_after_approval: { type: boolean }
            refinement_decision_log:
              type: object
              required: [path, content, immutable_after_approval]
              properties:
                path: { type: string }
                content: { type: string }
                immutable_after_approval: { type: boolean }
        links:
          type: array
          items:
            type: object
            required: [rel, label, path]
            properties:
              rel: { type: string }
              label: { type: string }
              path: { type: string }
        pr_guidance:
          type: object
          additionalProperties: true
          description: PR title and body-link guidance that uses display ID plus slug paths rather than opaque internal IDs.
        approval_routing:
          type: object
          additionalProperties: true
        approval_summary:
          type: object
          additionalProperties: true
        commit_policy:
          type: object
          additionalProperties: true
    ExecutionContractDispatchPolicy:
      type: object
      required: [policy_version, status, canDispatch, selectedEngineerTier, selectedAssignee, selectionReasons, blockingReasons, contractSignals, principalReview, qaDispatch, failureLoop, metricsPolicy]
      properties:
        policy_version: { type: string, enum: [execution-contract-dispatch-policy.v1] }
        status: { type: string, enum: [ready, blocked] }
        canDispatch: { type: boolean }
        selectedEngineerTier: { type: string, enum: [Jr, Sr, Principal] }
        selectedAssignee:
          type: string
          enum: [engineer-jr, engineer-sr, engineer-principal]
        proposedEngineerTier:
          type: [string, 'null']
          enum: [Jr, Sr, Principal, null]
        proposedAssignee:
          type: [string, 'null']
        rerouted:
          type: boolean
          description: True when a proposed tier differs from the policy-selected tier.
        selectionReasons:
          type: array
          items:
            type: object
            additionalProperties: true
        blockingReasons:
          type: array
          items:
            type: object
            additionalProperties: true
        contractSignals:
          type: object
          additionalProperties: true
          description: Normalized template tier, risk flags, work category, test-plan clarity, QA applicability, and Principal triggers used by the policy.
        principalReview:
          type: object
          additionalProperties: true
        qaDispatch:
          type: object
          additionalProperties: true
          description: Indicates whether QA coverage work can run in parallel with Sr implementation.
        escalationPaths:
          type: object
          additionalProperties: true
        failureLoop:
          type: object
          additionalProperties: true
          description: Failing implementation work returns to the implementing Engineer first unless repeated-failure, unclear-root-cause, high-risk-regression, or contract-defect triggers require Principal escalation.
        metricsPolicy:
          type: object
          additionalProperties: true
          description: Quality/intervention outcome metrics used for tier measurement; excludes lines of code and raw task count.
    ExecutionContractDispatchReadiness:
      type: object
      required: [policy_version, skeletonRequired, canDispatch, missingRequiredArtifacts, riskFlags, blockedReasons, dispatchPolicy, reason]
      properties:
        policy_version: { type: string, enum: [execution-contract-verification-report-skeleton.v1] }
        skeletonRequired: { type: boolean }
        canDispatch: { type: boolean }
        missingRequiredArtifacts:
          type: array
          items: { type: string }
        riskFlags:
          type: array
          items: { type: string }
        blockedReasons:
          type: array
          items:
            type: object
            additionalProperties: true
        dispatchPolicy:
          $ref: '#/components/schemas/ExecutionContractDispatchPolicy'
        reason: { type: string }
    ExecutionContractVerificationReport:
      type: object
      required: [policy_version, report_id, display_id, environment, slug, contract_version, required, status, generated_at, path, content, required_evidence, links, dispatch_gate]
      properties:
        policy_version: { type: string, enum: [execution-contract-verification-report-skeleton.v1] }
        report_id: { type: string }
        task_id: { type: string }
        source_task_id: { type: string }
        display_id:
          type: string
          description: Production skeletons use `TSK-123` display IDs so the generated path lands under `docs/reports/{display-id}-{slug}-verification.md`.
        environment: { type: string, enum: [production, staging, local] }
        slug: { type: string }
        title: { type: string }
        contract_id: { type: [string, 'null'] }
        contract_version: { type: integer }
        required: { type: boolean }
        required_reason: { type: string }
        status: { type: string, enum: [generated] }
        generated_at: { type: string, format: date-time }
        generated_by: { type: [string, 'null'] }
        path: { type: string }
        content: { type: string }
        required_evidence:
          type: object
          required: [acceptance_criteria, test, security, sre, rollout, operator_customer_review, definition_of_done]
          properties:
            acceptance_criteria: { type: string }
            test: { type: string }
            security: { type: string }
            sre: { type: string }
            rollout: { type: string }
            operator_customer_review: { type: string }
            definition_of_done: { type: string }
        links:
          type: array
          items:
            type: object
            required: [rel, label, path]
            properties:
              rel: { type: string }
              label: { type: string }
              path: { type: string }
        dispatch_gate:
          type: object
          additionalProperties: true
          description: Dispatch gate snapshot including skeleton state, selected engineer tier, selected engineer assignee, QA parallel eligibility, and the embedded dispatch policy.
    ContractCoverageEvidence:
      type: object
      required: [id, label, kind, value, automated]
      properties:
        id: { type: string }
        label: { type: string }
        kind:
          type: string
          description: Evidence source kind. `manual` or automated=false evidence is insufficient by itself for covered implementation or verification rows.
        value: { type: string }
        automated: { type: boolean }
    ContractCoverageAuditRow:
      type: object
      required: [row_id, requirement_id, requirement_text, coverage_area, contract_version, implementation_attempt, status, implementation_evidence, verification_evidence]
      properties:
        row_id: { type: string }
        requirement_id:
          type: string
          description: Must map to a committed requirement in the approved Execution Contract. Deferred Considerations are excluded unless promoted into committed scope.
        requirement_text: { type: string }
        source_section_id: { type: [string, 'null'] }
        coverage_area:
          type: string
          description: Simple rows cover committed acceptance criteria; Standard rows cover acceptance criteria and test evidence; Complex/Epic rows may include UX, QA, SRE, security, rollout, docs, and observability contract sections.
        contract_version: { type: integer }
        implementation_attempt: { type: integer }
        status:
          type: string
          description: `covered`, `not_applicable`, or an incomplete/exception status. Covered rows require implementation and verification evidence unless non-code or not-applicable rationale applies.
        implementation_evidence:
          type: array
          items:
            $ref: '#/components/schemas/ContractCoverageEvidence'
        verification_evidence:
          type: array
          items:
            $ref: '#/components/schemas/ContractCoverageEvidence'
        non_code: { type: boolean }
        not_applicable: { type: boolean }
        exception_type:
          type: [string, 'null']
          description: `implementation_incomplete` is a blocking committed-requirement exception that prevents QA Verification and Operator Closeout.
        exception_rationale: { type: [string, 'null'] }
        exception_approved: { type: boolean }
        dependent_requirement_ids:
          type: array
          items: { type: string }
        submitted_by: { type: [string, 'null'] }
        submitted_at: { type: [string, 'null'], format: date-time }
    ContractCoverageAudit:
      type: object
      required: [policy_version, audit_id, task_id, contract_version, implementation_attempt, audit_version, status, tier_scaling, required_requirements, rows]
      properties:
        policy_version: { type: string, enum: [execution-contract-coverage-audit.v1] }
        audit_id: { type: string }
        task_id: { type: string }
        contract_id: { type: [string, 'null'] }
        contract_version: { type: integer }
        implementation_attempt: { type: integer }
        audit_version: { type: integer }
        status: { type: string, enum: [submitted, closed, implementation_incomplete] }
        submitted_at: { type: [string, 'null'], format: date-time }
        submitted_by: { type: [string, 'null'] }
        validated_at: { type: [string, 'null'], format: date-time }
        validated_by: { type: [string, 'null'] }
        tier_scaling:
          type: object
          additionalProperties: true
          description: Captures Simple checklist, Standard acceptance/test matrix, or Complex/Epic full contract-section scaling and marks Deferred Considerations excluded.
        required_requirements:
          type: array
          items:
            type: object
            additionalProperties: true
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ContractCoverageAuditRow'
    ContractCoverageAuditValidation:
      type: object
      required: [policy_version, status, gate_closed, can_start_qa_verification, blocks_operator_closeout, contract_version, implementation_attempt, row_results, blocking_exceptions, autonomy_confidence_signal, markdown]
      properties:
        policy_version: { type: string, enum: [execution-contract-coverage-audit.v1] }
        status: { type: string, enum: [closed, implementation_incomplete] }
        gate_closed: { type: boolean }
        can_start_qa_verification: { type: boolean }
        blocks_operator_closeout: { type: boolean }
        contract_version: { type: integer }
        implementation_attempt: { type: integer }
        required_row_count: { type: integer }
        covered_row_count: { type: integer }
        neutral_exception_count: { type: integer }
        rejected_row_count: { type: integer }
        row_results:
          type: array
          items:
            type: object
            additionalProperties: true
        blocking_exceptions:
          type: array
          items:
            type: object
            required: [exception_type, requirement_id, reason_code, detail, blocks]
            properties:
              exception_type: { type: string, enum: [implementation_incomplete] }
              requirement_id: { type: string }
              row_id: { type: string }
              source_section_id: { type: [string, 'null'] }
              coverage_area: { type: [string, 'null'] }
              reason_code: { type: string }
              detail: { type: string }
              blocks:
                type: array
                items: { type: string, enum: [qa_verification, operator_closeout] }
        autonomy_confidence_signal:
          type: object
          required: [outcome, first_pass_full_coverage, neutral_exceptions, implementation_incomplete_count, reason]
          properties:
            outcome: { type: string, enum: [positive, neutral, negative] }
            first_pass_full_coverage: { type: boolean }
            neutral_exceptions: { type: integer }
            implementation_incomplete_count: { type: integer }
            reason: { type: string }
        markdown:
          type: object
          required: [path, anchor, content]
          properties:
            path: { type: string }
            anchor: { type: string, enum: [contract-coverage-audit] }
            content: { type: string }
    ContractCoverageAuditProjection:
      type: object
      required: [active, latest, validation, audits, readiness]
      properties:
        active: { type: boolean }
        latest:
          oneOf:
            - $ref: '#/components/schemas/ContractCoverageAudit'
            - type: 'null'
        validation:
          oneOf:
            - $ref: '#/components/schemas/ContractCoverageAuditValidation'
            - type: 'null'
        audits:
          type: array
          items:
            type: object
            additionalProperties: true
        readiness:
          oneOf:
            - $ref: '#/components/schemas/ContractCoverageAuditValidation'
            - type: 'null'
    ExecutionContractProjection:
      type: object
      required: [active, latest, latestVersion, versions, validation, approval, markdown, artifacts, verificationReport, dispatchReadiness, contractCoverageAudit]
      properties:
        active: { type: boolean }
        latest:
          oneOf:
            - $ref: '#/components/schemas/ExecutionContract'
            - type: 'null'
        latestVersion: { type: [integer, 'null'] }
        versions:
          type: array
          items:
            type: object
            additionalProperties: true
        validation:
          oneOf:
            - $ref: '#/components/schemas/ExecutionContractValidation'
            - type: 'null'
        approval:
          type: [object, 'null']
          properties:
            version: { type: integer }
            approvedAt: { type: [string, 'null'], format: date-time }
            approvedBy: { type: [string, 'null'] }
            approvalMode:
              type: [string, 'null']
              enum: [explicit, policy, null]
            autoApproval:
              oneOf:
                - $ref: '#/components/schemas/ExecutionContractAutoApprovalRecord'
                - type: 'null'
            committedScope:
              type: object
              additionalProperties: true
            approvalSummary:
              $ref: '#/components/schemas/ExecutionContractApprovalSummary'
        markdown:
          type: [object, 'null']
          properties:
            version: { type: integer }
            generatedAt: { type: [string, 'null'], format: date-time }
            generatedBy: { type: [string, 'null'] }
            markdown: { type: string }
            authoritative: { type: boolean, enum: [false] }
        artifacts:
          oneOf:
            - $ref: '#/components/schemas/ExecutionContractArtifactBundle'
            - type: 'null'
        verificationReport:
          oneOf:
            - $ref: '#/components/schemas/ExecutionContractVerificationReport'
            - type: 'null'
        dispatchReadiness:
          $ref: '#/components/schemas/ExecutionContractDispatchReadiness'
        contractCoverageAudit:
          $ref: '#/components/schemas/ContractCoverageAuditProjection'
    ExecutionContractUpsertRequest:
      type: object
      required: [templateTier]
      properties:
        templateTier: { type: string, enum: [Simple, Standard, Complex, Epic] }
        sections:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - $ref: '#/components/schemas/ExecutionContractSection'
        materialChangeSummary: { type: string }
        materialChangeReason: { type: string }
        riskFlags:
          type: array
          description: Deterministic reviewer-routing risk flags such as deployment, observability, reliability, auth, data, production_behavior, security, api, feasibility, human_workflow, and high_risk_engineering.
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        dispatchSignals:
          type: object
          description: Optional dispatch-policy hints. `workCategory` may be `tests`, `fixtures`, `docs`, `clear_refactor`, or `feature`; `clearTestPlan` marks a clear failing/pending test plan; `proposedEngineerTier` may be `Jr`, `Sr`, or `Principal`; `qaCoverageApplicable` controls Standard-plus QA parallel eligibility.
          additionalProperties: true
        reviewers:
          type: object
          description: Reviewer status and optional model judgment. Deterministic rules are applied first; stricter model-required reviewers remain required unless PM provides an operator-visible downgrade rationale.
          additionalProperties:
            type: object
            additionalProperties: true
        reviewFeedback:
          type: object
          description: Blocking questions and non-blocking comments used by the approval gate summary.
          additionalProperties: true
        scopeBoundaries:
          type: object
          additionalProperties: true
        idempotencyKey: { type: string }
    ExecutionContractUpsertResponse:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:
          type: object
          required: [taskId, version, materialChange, templateTier, status, validation, contract]
          properties:
            taskId: { type: string }
            version: { type: integer }
            previousVersion: { type: [integer, 'null'] }
            materialChange: { type: boolean }
            templateTier: { type: string }
            status: { type: string }
            validation:
              $ref: '#/components/schemas/ExecutionContractValidation'
            contract:
              $ref: '#/components/schemas/ExecutionContract'
            recordedAt: { type: string, format: date-time }
    PaginatedTaskHistoryResponse:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        page_info:
          type: object
          required: [limit, next_cursor, has_more]
          properties:
            limit: { type: integer }
            next_cursor: { type: [string, 'null'] }
            has_more: { type: boolean }
    StandardErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    Unauthorized:
      description: Missing or invalid bearer token / auth context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    Forbidden:
      description: Authenticated caller lacks the required role permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    FeatureDisabled:
      description: Audit foundation is disabled by runtime feature flag
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    InternalError:
      description: The request could not complete. Task creation failures use `task_creation_failed` with `details.failed_step`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
security:
  - BearerAuth: []
paths:
  /tasks:
    get:
      summary: List projected task summaries with additive owner metadata
      description: |
        Returns the projected task-list read surface used by the browser list view.
        Any caller with `state:read` can see `current_owner`/`owner` as read-only metadata.
        Assignment remains restricted to callers with `assignment:write`.
      responses:
        '200':
          description: Task-list projection response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
    post:
      summary: Create an Intake Draft task from raw operator requirements
      description: |
        Creates a Task in `DRAFT` from raw operator requirements, stores the raw intake text, routes the task to Product Manager refinement with `current_owner=pm`, and appends `task.refinement_requested`.
        Intake `title` is optional but must be 120 characters or fewer when provided; invalid intake titles return `invalid_intake_title`. The legacy refined-field request body remains accepted for compatibility while browser intake uses `raw_requirements`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/IntakeDraftCreateRequest'
                - $ref: '#/components/schemas/LegacyTaskCreateRequest'
      responses:
        '201':
          description: Task created in DRAFT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/events:
    post:
      summary: Append a workflow audit event
      description: |
        Generic event writes reject dedicated Execution Contract lifecycle events that must run route-specific gates, including `task.execution_contract_approved`, `task.execution_contract_verification_report_generated`, `task.execution_contract_artifact_bundle_generated`, and `task.execution_contract_artifact_bundle_approved`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, actorType, idempotencyKey]
              properties:
                eventType: { type: string }
                actorId: { type: string }
                actorType: { type: string }
                idempotencyKey: { type: string }
                payload: { type: object, additionalProperties: true }
      responses:
        '202':
          description: Event accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/execution-contract:
    get:
      summary: Read the latest structured Execution Contract projection
      description: |
        Returns the authoritative structured Execution Contract Task data and version history for the selected Intake Draft task. The Markdown story, when present, is a generated view and is not authoritative.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Latest Execution Contract projection
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/ExecutionContractProjection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No Execution Contract exists for this task.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
    post:
      summary: Create or version a structured Execution Contract from an Intake Draft
      description: |
        PM/admin-only mutation. Creates the first draft contract version from the selected `USER_STORY_TEMPLATE.md` tier or records a new version when material contract sections change, including structured payload or section metadata updates. The contract remains PM-owned and does not dispatch implementation.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionContractUpsertRequest'
      responses:
        '201':
          description: Execution Contract version recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionContractUpsertResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: The task is not an Intake Draft source or is not in a valid refinement state.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/execution-contract/validate:
    post:
      summary: Validate the latest Execution Contract against tier-required sections
      description: |
        Records `task.execution_contract_validated` with the Simple, Standard, Complex, or Epic required-section result. Valid contracts become ready for Markdown generation and operator review, but implementation dispatch remains out of scope.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Validation result recorded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No Execution Contract exists for this task.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/execution-contract/markdown:
    get:
      summary: Read the latest generated Execution Contract Markdown view
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Non-authoritative generated Markdown view
        '404':
          description: Markdown has not been generated for the latest version.
    post:
      summary: Generate Markdown user story from structured Execution Contract data
      description: |
        Generates a human-readable story for review, repo artifacts, GitHub issues, PRs, and docs. The structured Execution Contract remains authoritative.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Markdown view generated from structured data
        '409':
          description: Required sections are missing, so Markdown cannot be generated.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/execution-contract/approve:
    post:
      summary: Approve the latest valid Execution Contract without dispatching implementation
      description: |
        Records `task.execution_contract_approved`, marks the latest valid contract as approved, and freezes its `committed_scope.committed_requirements` as future implementation scope. Approval is blocked unless deterministic reviewer routing has all required role approvals recorded and all blocking questions are resolved. Non-blocking comments are returned in `approvalSummary.nonBlockingComments` without blocking approval. `out_of_scope`, `deferred_considerations`, and `follow_up_tasks` remain explicitly excluded unless promoted through a new approved contract version or a new Intake Draft. When `autoApproval` is requested, `execution-contract-low-risk-simple-auto-approval.v1` may record Operator Approval by policy only for low-risk Simple contracts; blocked policy attempts return `execution_contract_auto_approval_blocked` and require explicit Operator Approval.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                approvalNote: { type: string }
                autoApproval:
                  type: boolean
                  description: Request policy-based Operator Approval for a low-risk Simple contract.
                autoApprovalRationale:
                  type: string
                  description: Optional operator-visible rationale recorded with the policy approval.
                idempotencyKey: { type: string }
      responses:
        '201':
          description: Execution Contract approved and committed scope recorded
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    required: [taskId, version, status, validation, committedScope, approvalSummary, approvedAt, approvedBy]
                    properties:
                      taskId: { type: string }
                      version: { type: integer }
                      status: { type: string, enum: [approved] }
                      validation:
                        $ref: '#/components/schemas/ExecutionContractValidation'
                      committedScope:
                        type: object
                        additionalProperties: true
                      approvalSummary:
                        $ref: '#/components/schemas/ExecutionContractApprovalSummary'
                      autoApproval:
                        oneOf:
                          - $ref: '#/components/schemas/ExecutionContractAutoApprovalRecord'
                          - type: 'null'
                      autoApprovalPolicy:
                        $ref: '#/components/schemas/ExecutionContractAutoApprovalPolicy'
                      approvedAt: { type: string, format: date-time }
                      approvedBy: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Latest contract is missing required sections, required reviewer approvals are missing, unresolved blocking questions remain, or requested policy auto-approval is not eligible. Approval-gate failures use `execution_contract_approval_blocked` and include `approval_summary`, `missing_required_approvals`, and `unresolved_blocking_questions`; policy failures use `execution_contract_auto_approval_blocked` and include `auto_approval_policy`, `blocking_reasons`, and `explicit_operator_approval_required`.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/execution-contract/verification-report:
    get:
      summary: Read the latest generated Execution Contract verification report skeleton
      description: |
        Returns the generated `docs/reports/` skeleton for the latest approved Execution Contract version. The skeleton contains required evidence copied from the approved contract but does not fill final implementation evidence.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Generated verification report skeleton
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/ExecutionContractVerificationReport'
        '404':
          description: No verification report skeleton exists for the latest version.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
    post:
      summary: Generate a verification report skeleton from the approved Execution Contract
      description: |
        PM/admin-only mutation. Records `task.execution_contract_verification_report_generated` after the latest Execution Contract is approved. The generated skeleton path is `docs/reports/{display-id}-{slug}-verification.md` and includes required evidence from approved contract sections for acceptance criteria, tests, security, SRE, rollout, operator/customer review, and Definition of Done. Implementation dispatch is blocked for Standard, Complex, Epic, and risk-bearing Simple contracts until this event exists. Simple contracts without risk flags may dispatch without a skeleton.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                displayId: { type: string }
                environment: { type: string, enum: [production, staging, local] }
                title: { type: string }
                slug: { type: string }
                idempotencyKey: { type: string }
      responses:
        '201':
          description: Verification report skeleton generated
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    required: [taskId, version, reportId, status, path, required, requiredEvidence, links, dispatchGate, verificationReport, generatedAt]
                    properties:
                      taskId: { type: string }
                      version: { type: integer }
                      reportId: { type: string }
                      status: { type: string, enum: [generated] }
                      path: { type: string }
                      required: { type: boolean }
                      requiredEvidence:
                        type: object
                        additionalProperties: true
                      links:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      dispatchGate:
                        type: object
                        additionalProperties: true
                      verificationReport:
                        $ref: '#/components/schemas/ExecutionContractVerificationReport'
                      generatedAt: { type: string, format: date-time }
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Latest contract is not approved or the display ID would collide with production report naming rules.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/contract-coverage-audit:
    get:
      summary: Read the latest Contract Coverage Audit projection
      description: |
        Returns the structured Contract Coverage Audit Task data for the latest approved Execution Contract. Rows are generated only from `committed_scope.committed_requirements`; out-of-scope notes, follow-up tasks, and Deferred Considerations are excluded unless promoted into a new approved contract version.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Latest Contract Coverage Audit projection
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/ContractCoverageAuditProjection'
        '404':
          description: No approved Execution Contract exists for this task.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
    post:
      summary: Submit the Engineer Contract Coverage Audit matrix
      description: |
        Engineer/admin-only mutation. Records `task.contract_coverage_audit_submitted` with `execution-contract-coverage-audit.v1` structured rows versioned to the latest approved Execution Contract and the current implementation attempt. This submission is required before moving from Implementation or In Progress into Contract Coverage Audit.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rows]
              properties:
                rows:
                  type: array
                  items:
                    $ref: '#/components/schemas/ContractCoverageAuditRow'
                idempotencyKey: { type: string }
      responses:
        '201':
          description: Coverage matrix submitted
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    required: [taskId, auditId, auditVersion, contractVersion, implementationAttempt, status, rows, requiredRequirements, readiness, submittedAt]
                    properties:
                      taskId: { type: string }
                      auditId: { type: string }
                      auditVersion: { type: integer }
                      contractVersion: { type: integer }
                      implementationAttempt: { type: integer }
                      status: { type: string, enum: [submitted] }
                      rows:
                        type: array
                        items:
                          $ref: '#/components/schemas/ContractCoverageAuditRow'
                      requiredRequirements:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      readiness:
                        $ref: '#/components/schemas/ContractCoverageAuditValidation'
                      submittedAt: { type: string, format: date-time }
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Latest Execution Contract is not approved, the task is not in Implementation/In Progress, or no current implementation attempt exists.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/contract-coverage-audit/validate:
    post:
      summary: Validate and close the Contract Coverage Audit gate
      description: |
        QA/admin-only mutation. Records `task.contract_coverage_audit_validated`. QA must validate every row before QA Verification begins. Rows lacking implementation evidence, verification evidence, automated evidence, or a valid not-applicable/approved exception rationale produce blocking `implementation_incomplete` exceptions that block QA Verification and Operator Closeout. When QA returns work to Engineering, the next Engineer submission creates a new implementation attempt and requires revalidation.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  description: Optional QA-corrected row set to validate instead of the submitted rows.
                  items:
                    $ref: '#/components/schemas/ContractCoverageAuditRow'
                idempotencyKey: { type: string }
      responses:
        '201':
          description: Coverage validation recorded
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    required: [taskId, auditId, auditVersion, contractVersion, implementationAttempt, status, gateClosed, canStartQaVerification, blocksOperatorCloseout, blockingExceptions, autonomyConfidenceSignal, markdown, audit, validation, validatedAt]
                    properties:
                      taskId: { type: string }
                      auditId: { type: string }
                      auditVersion: { type: integer }
                      contractVersion: { type: integer }
                      implementationAttempt: { type: integer }
                      status: { type: string, enum: [closed, implementation_incomplete] }
                      gateClosed: { type: boolean }
                      canStartQaVerification: { type: boolean }
                      blocksOperatorCloseout: { type: boolean }
                      blockingExceptions:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      autonomyConfidenceSignal:
                        type: object
                        additionalProperties: true
                      markdown:
                        type: object
                        additionalProperties: true
                      audit:
                        $ref: '#/components/schemas/ContractCoverageAudit'
                      validation:
                        $ref: '#/components/schemas/ContractCoverageAuditValidation'
                      validatedAt: { type: string, format: date-time }
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: The task is not in Contract Coverage Audit, no matrix has been submitted, or the latest contract is not approved.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/contract-coverage-audit/markdown:
    get:
      summary: Read the generated Contract Coverage Audit Markdown view
      description: |
        Returns the generated `docs/reports/` Contract Coverage Audit Markdown view from the latest QA validation. The structured coverage audit remains authoritative.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Generated Contract Coverage Audit Markdown view
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    required: [path, anchor, content]
                    properties:
                      path: { type: string }
                      anchor: { type: string, enum: [contract-coverage-audit] }
                      content: { type: string }
        '404':
          description: No Contract Coverage Audit Markdown view exists for the latest validation.
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/execution-contract/artifacts:
    get:
      summary: Read the latest generated repo artifact bundle
      description: |
        Returns the latest reviewable artifact bundle for the approved Execution Contract version. The bundle includes generated Markdown user-story content, Refinement Decision Log content, task-detail links, and PR guidance using display ID plus slug paths.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Generated artifact bundle
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/ExecutionContractArtifactBundle'
        '404':
          description: No artifact bundle exists for the latest version.
    post:
      summary: Generate reviewable repo artifacts from the approved Execution Contract
      description: |
        PM/admin-only mutation. Records `task.execution_contract_artifact_bundle_generated` after the latest Execution Contract is approved. Production bundles require `TSK-123` display IDs and generate `docs/user-stories/{display-id}-{slug}.md` plus `docs/refinement/{display-id}-{slug}.md`. Staging/local bundles use non-production aliases such as `STG-123` or `LOCAL-123`. The bundle is not commit-ready until artifact-bundle approval records the PM and required section-owner approvals.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                displayId: { type: string }
                environment: { type: string, enum: [production, staging, local] }
                title: { type: string }
                createGithubIssue:
                  type: boolean
                  default: false
                  description: GitHub issue creation is optional and default-off.
      responses:
        '201':
          description: Artifact bundle generated for review
        '409':
          description: Latest contract is not approved or the display ID would collide with production artifact naming rules.
  /tasks/{id}/execution-contract/artifacts/approve:
    post:
      summary: Approve a generated repo artifact bundle for commit
      description: |
        Records `task.execution_contract_artifact_bundle_approved` only when PM approval, section-owner approvals for section-owned generated content, and exception-triggered operator approval are present. Approval calls may be incremental; supplied role approvals are merged with existing bundle approvals, and omitted roles are not reset. If content reveals scope mismatch, promotes Deferred Considerations, changes committed requirements, accepts unresolved non-blocking comments, or is bundled with Operator Approval or Closeout, operator approval is required. Missing approvals return `artifact_bundle_approval_blocked`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approvals:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      status: { type: string }
                      actorId: { type: string }
      responses:
        '201':
          description: Artifact bundle approved for commit
        '409':
          description: Artifact bundle approval is blocked by missing PM, section-owner, or operator approvals.
  /tasks/{id}:
    get:
      summary: Canonical task detail summary response
      description: |
        Returns the projected task detail summary. `current_owner` and `owner` are additive read fields
        exposed to the same `state:read` audience as the rest of the task summary.
      responses:
        '200':
          description: Task summary response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSummaryResponse'
  /tasks/{id}/history:
    get:
      summary: Query projected task history
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - name: eventType
          in: query
          schema: { type: string }
        - name: actorId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500 }
          description: Optional cursor-pagination page size. When present, the API returns `{ items, page_info }`.
        - name: cursor
          in: query
          schema: { type: integer, minimum: 0 }
          description: Exclusive sequence-number cursor for the next page.
      responses:
        '200':
          description: Projected history rows
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
                  - $ref: '#/components/schemas/PaginatedTaskHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/state:
    get:
      summary: Query projected current state for a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Current state response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/relationships:
    get:
      summary: Query projected relationship view for a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Relationship response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/sre-monitoring/start:
    post:
      summary: Start the SRE monitoring window for a task already routed into `SRE_MONITORING`
      description: |
        Requires SRE or admin privileges and durable deployment confirmation inputs.
        The runtime feature can be disabled by either `ff_sre_monitoring` or `ff-sre-monitoring`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deploymentEnvironment, deploymentUrl, deploymentVersion]
              properties:
                deploymentEnvironment: { type: string }
                deploymentUrl: { type: string, format: uri }
                deploymentVersion: { type: string }
                evidence:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Monitoring window started
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/sre-monitoring/approve:
    post:
      summary: Record early SRE approval for a stable monitoring window
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                evidence:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Approval recorded and task advanced to close review
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/sre-monitoring/anomaly-child-task:
    post:
      summary: Create a linked P0 child task from a live monitoring anomaly
      description: |
        Requires SRE or admin privileges while the parent task is in `SRE_MONITORING`.
        The runtime feature can be disabled by `ff_child_task_creation`.
        Successful creation links the child back to the parent, records a P0 audit reason, and blocks the parent
        while leaving it viewable/commentable for follow-up coordination.
        The parent block is released automatically when the linked anomaly child reaches a resolved terminal state.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service, anomalySummary, metrics, logs, errorSamples]
              properties:
                title: { type: string }
                service: { type: string }
                anomalySummary: { type: string }
                metrics:
                  type: array
                  items: { type: string }
                logs:
                  type: array
                  items: { type: string }
                errorSamples:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Child task created and linked to the parent monitoring task
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/pm-business-context:
    post:
      summary: Finalize machine-generated PM business context for an anomaly child task
      description: |
        Requires PM or admin privileges while the anomaly child task remains in `BACKLOG`
        with `waiting_state=pm_business_context_required`.
        Successful completion records a dedicated `task.pm_business_context_completed` audit event,
        clears the PM gate, and marks the anomaly context as finalized by PM.
        Generic event injection is not a supported completion path for this workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessContext]
              properties:
                businessContext: { type: string }
      responses:
        '200':
          description: PM business context finalized and architect work unblocked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/close-review/exceptional-dispute:
    post:
      summary: Escalate an exceptional close-review dispute for human stakeholder resolution
      description: |
        Requires PM, architect, or admin privileges while the task is in `PM_CLOSE_REVIEW`.
        Successful escalation keeps the task in governed close review, records an escalation artifact,
        and routes the task into the protected Human Inbox with `waiting_state=awaiting_human_stakeholder_escalation`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary, rationale]
              properties:
                summary: { type: string }
                rationale: { type: string }
                severity: { type: string, enum: [warning, critical] }
      responses:
        '201':
          description: Exceptional dispute escalation recorded and routed for human review
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/observability-summary:
    get:
