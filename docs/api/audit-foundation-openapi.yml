openapi: 3.1.0
info:
  title: Audit Foundation API
  version: 0.1.0
  description: |
    Canonical audit and workflow HTTP contract.
    The task-list projection now also carries additive queue/WIP metadata, optional SRE monitoring preview data, and close-governance escalation previews used by the human decision inbox.
    SRE monitoring runtime accepts both `ff_sre_monitoring` and `ff-sre-monitoring` as equivalent feature-flag names.
    Expired monitoring escalations are materialized by background worker processing (`processExpiredSreMonitoring`) rather than read-side mutation.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
    ActorHeader:
      name: x-actor-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
  schemas:
    OwnerSummary:
      type: [object, 'null']
      properties:
        actor_id: { type: string }
        display_name: { type: string }
    TaskSummaryResponse:
      type: object
      required: [task_id, tenant_id, title, current_stage, current_owner, owner, blocked, closed, freshness]
      properties:
        task_id: { type: string }
        tenant_id: { type: string }
        title: { type: string }
        priority: { type: [string, 'null'] }
        current_stage: { type: [string, 'null'] }
        current_owner: { type: [string, 'null'] }
        owner:
          $ref: '#/components/schemas/OwnerSummary'
        blocked: { type: boolean }
        closed: { type: boolean }
        queue_entered_at: { type: [string, 'null'], format: date-time }
        wip_owner: { type: [string, 'null'] }
        wip_started_at: { type: [string, 'null'], format: date-time }
        freshness:
          type: object
          properties:
            status: { type: string }
            last_updated_at: { type: [string, 'null'], format: date-time }
        monitoring:
          type: [object, 'null']
          additionalProperties: true
          description: Optional SRE monitoring preview used by the `/inbox/sre` dashboard rows.
    TaskListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummaryResponse'
    PaginatedTaskHistoryResponse:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        page_info:
          type: object
          required: [limit, next_cursor, has_more]
          properties:
            limit: { type: integer }
            next_cursor: { type: [string, 'null'] }
            has_more: { type: boolean }
    StandardErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details:
              type: object
              additionalProperties: true
  responses:
    Unauthorized:
      description: Missing or invalid bearer token / auth context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    Forbidden:
      description: Authenticated caller lacks the required role permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    FeatureDisabled:
      description: Audit foundation is disabled by runtime feature flag
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
security:
  - BearerAuth: []
paths:
  /tasks:
    get:
      summary: List projected task summaries with additive owner metadata
      description: |
        Returns the projected task-list read surface used by the browser list view.
        Any caller with `state:read` can see `current_owner`/`owner` as read-only metadata.
        Assignment remains restricted to callers with `assignment:write`.
      responses:
        '200':
          description: Task-list projection response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/events:
    post:
      summary: Append a workflow audit event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, actorType, idempotencyKey]
              properties:
                eventType: { type: string }
                actorId: { type: string }
                actorType: { type: string }
                idempotencyKey: { type: string }
                payload: { type: object, additionalProperties: true }
      responses:
        '202':
          description: Event accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}:
    get:
      summary: Canonical task detail summary response
      description: |
        Returns the projected task detail summary. `current_owner` and `owner` are additive read fields
        exposed to the same `state:read` audience as the rest of the task summary.
      responses:
        '200':
          description: Task summary response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSummaryResponse'
  /tasks/{id}/history:
    get:
      summary: Query projected task history
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - name: eventType
          in: query
          schema: { type: string }
        - name: actorId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500 }
          description: Optional cursor-pagination page size. When present, the API returns `{ items, page_info }`.
        - name: cursor
          in: query
          schema: { type: integer, minimum: 0 }
          description: Exclusive sequence-number cursor for the next page.
      responses:
        '200':
          description: Projected history rows
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
                  - $ref: '#/components/schemas/PaginatedTaskHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/state:
    get:
      summary: Query projected current state for a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Current state response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/relationships:
    get:
      summary: Query projected relationship view for a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Relationship response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/sre-monitoring/start:
    post:
      summary: Start the SRE monitoring window for a task already routed into `SRE_MONITORING`
      description: |
        Requires SRE or admin privileges and durable deployment confirmation inputs.
        The runtime feature can be disabled by either `ff_sre_monitoring` or `ff-sre-monitoring`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deploymentEnvironment, deploymentUrl, deploymentVersion]
              properties:
                deploymentEnvironment: { type: string }
                deploymentUrl: { type: string, format: uri }
                deploymentVersion: { type: string }
                evidence:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Monitoring window started
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/sre-monitoring/approve:
    post:
      summary: Record early SRE approval for a stable monitoring window
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                evidence:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Approval recorded and task advanced to close review
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/sre-monitoring/anomaly-child-task:
    post:
      summary: Create a linked P0 child task from a live monitoring anomaly
      description: |
        Requires SRE or admin privileges while the parent task is in `SRE_MONITORING`.
        The runtime feature can be disabled by `ff_child_task_creation`.
        Successful creation links the child back to the parent, records a P0 audit reason, and blocks the parent
        while leaving it viewable/commentable for follow-up coordination.
        The parent block is released automatically when the linked anomaly child reaches a resolved terminal state.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service, anomalySummary, metrics, logs, errorSamples]
              properties:
                title: { type: string }
                service: { type: string }
                anomalySummary: { type: string }
                metrics:
                  type: array
                  items: { type: string }
                logs:
                  type: array
                  items: { type: string }
                errorSamples:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Child task created and linked to the parent monitoring task
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/pm-business-context:
    post:
      summary: Finalize machine-generated PM business context for an anomaly child task
      description: |
        Requires PM or admin privileges while the anomaly child task remains in `BACKLOG`
        with `waiting_state=pm_business_context_required`.
        Successful completion records a dedicated `task.pm_business_context_completed` audit event,
        clears the PM gate, and marks the anomaly context as finalized by PM.
        Generic event injection is not a supported completion path for this workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessContext]
              properties:
                businessContext: { type: string }
      responses:
        '200':
          description: PM business context finalized and architect work unblocked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/close-review/exceptional-dispute:
    post:
      summary: Escalate an exceptional close-review dispute for human stakeholder resolution
      description: |
        Requires PM, architect, or admin privileges while the task is in `PM_CLOSE_REVIEW`.
        Successful escalation keeps the task in governed close review, records an escalation artifact,
        and routes the task into the protected Human Inbox with `waiting_state=awaiting_human_stakeholder_escalation`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary, rationale]
              properties:
                summary: { type: string }
                rationale: { type: string }
                severity: { type: string, enum: [warning, critical] }
      responses:
        '201':
          description: Exceptional dispute escalation recorded and routed for human review
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /tasks/{id}/observability-summary:
    get:
      summary: Return non-authoritative observability summary and approved_correlation_ids / correlation pointers
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Summary response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /metrics:
    get:
      summary: Export Prometheus-style audit metrics
      responses:
        '200':
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
  /projections/process:
    post:
      summary: Trigger bounded projection queue processing
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 100
      responses:
        '202':
          description: Projection processing accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/FeatureDisabled'
