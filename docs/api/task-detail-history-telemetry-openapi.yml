openapi: 3.1.0
info:
  title: Task Detail History & Telemetry Read API
  version: 0.2.0
  description: |
    Canonical read-side contracts for SF-019 / issue #27.
    These contracts are additive on top of the SF-017 audit foundation and are safe for the Task Detail UI to consume without frontend inference.
    Governance note: task-detail UI changes should update this contract in the same pull request.
    Governed close-review payloads now include explicit decision-readiness semantics so the browser can hide
    stakeholder actions until either dual cancellation recommendations or an active escalation exists.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
    ActorHeader:
      name: x-actor-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
  schemas:
    StandardErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details:
              type: object
              additionalProperties: true
    TaskSummaryResponse:
      type: object
      required: [task_id, tenant_id, title, priority, current_stage, current_owner, blocked, freshness, status_indicator, closed]
      properties:
        task_id: { type: string }
        tenant_id: { type: string }
        title: { type: string }
        priority: { type: [string, 'null'] }
        current_stage: { type: [string, 'null'] }
        current_owner: { type: [string, 'null'] }
        owner:
          type: [object, 'null']
          properties:
            actor_id: { type: string }
            display_name: { type: string }
        blocked: { type: boolean }
        waiting_state: { type: [string, 'null'] }
        next_required_action: { type: [string, 'null'] }
        freshness:
          type: object
          required: [status, last_updated_at]
          properties:
            status: { type: string, enum: [fresh, stale, unknown] }
            last_updated_at: { type: [string, 'null'], format: date-time }
        status_indicator: { type: string }
        status:
          type: object
          required: [blocked, waiting_state, closed, freshness]
          properties:
            blocked: { type: boolean }
            waiting_state: { type: [string, 'null'] }
            closed: { type: boolean }
            freshness: { type: string }
        closed: { type: boolean }
    TaskHistoryItem:
      type: object
      required: [item_id, event_id, event_type, occurred_at, actor, sequence_number, summary, display]
      properties:
        item_id: { type: string, description: Stable timeline item identifier. Equal to event_id for canonical audit events. }
        event_id: { type: string }
        tenant_id: { type: string }
        event_type: { type: string }
        event_type_label: { type: string }
        occurred_at: { type: string, format: date-time }
        recorded_at: { type: [string, 'null'], format: date-time }
        actor:
          type: object
          required: [actor_id, actor_type]
          properties:
            actor_id: { type: string }
            actor_type: { type: string }
            display_name: { type: [string, 'null'] }
        actor_id: { type: string }
        actor_type: { type: string }
        sequence_number: { type: integer }
        summary: { type: string, description: Backend-generated canonical human-readable timeline summary. }
        display:
          type: object
          required: [summary, event_type_label, is_known_type, fallback_used]
          properties:
            summary: { type: string }
            event_type_label: { type: string }
            is_known_type: { type: boolean }
            fallback_used: { type: boolean }
        correlation:
          type: [object, 'null']
          properties:
            correlation_id: { type: [string, 'null'] }
            trace_id: { type: [string, 'null'] }
        source: { type: [string, 'null'] }
        payload:
          type: object
          additionalProperties: true
    PaginatedTaskHistoryResponse:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskHistoryItem'
        page_info:
          type: object
          required: [limit, next_cursor, has_more]
          properties:
            limit: { type: integer }
            next_cursor: { type: [string, 'null'] }
            has_more: { type: boolean }
    ObservabilitySummaryResponse:
      type: object
      required: [task_id, tenant_id, status, last_updated_at, freshness, degraded, event_count, key_signals, correlation, access]
      properties:
        task_id: { type: string }
        tenant_id: { type: string }
        status: { type: string, enum: [ok, degraded] }
        last_updated_at: { type: [string, 'null'], format: date-time }
        freshness:
          type: object
          required: [status, last_updated_at]
          properties:
            status: { type: string, enum: [fresh, stale] }
            last_updated_at: { type: [string, 'null'], format: date-time }
        degraded: { type: boolean }
        stale: { type: boolean }
        event_count: { type: integer }
        key_signals:
          type: object
          additionalProperties: true
        correlation:
          type: object
          required: [approved_correlation_ids, approved_links]
          properties:
            approved_correlation_ids:
              type: array
              items: { type: string }
            approved_links:
              type: array
              items:
                type: object
                additionalProperties: true
        access:
          type: object
          required: [restricted, scope, omission_applied, omitted_fields]
          properties:
            restricted: { type: boolean }
            scope: { type: string, enum: [summary_only, operator] }
            omission_applied: { type: boolean }
            omitted_fields:
              type: array
              items: { type: string }
        last_event_id: { type: string }
        last_event_type: { type: string }
        current_stage: { type: [string, 'null'] }
        correlation_ids:
          type: array
          items: { type: string }
        trace_ids:
          type: array
          items: { type: string }
        metrics:
          type: object
          additionalProperties: true
        links:
          type: array
          items:
            type: object
            additionalProperties: true
    TaskDetailActor:
      type: object
      required: [id, label, kind]
      properties:
        id: { type: [string, 'null'] }
        label: { type: string }
        kind: { type: string, enum: [assigned, unassigned, restricted, missing] }
    TaskDetailStatusRollup:
      type: object
      required: [label, state, total]
      properties:
        label: { type: string }
        state: { type: string, enum: [empty, active, waiting, blocked, done, draft, mixed] }
        total: { type: integer }
        mergedCount: { type: integer }
        openCount: { type: integer }
        draftCount: { type: integer }
        blockedCount: { type: integer }
    OrchestrationDependencyRef:
      type: object
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string }
    OrchestrationBlocker:
      type: object
      required: [type, reason]
      properties:
        type:
          type: string
          enum: [child_dependency, missing_dependency, circular_dependency, task_blocked, waiting_state]
        reason: { type: string }
        childTaskId: { type: [string, 'null'] }
        dependencyState: { type: [string, 'null'], enum: [ready, blocked, in_progress, done, 'null'] }
        title: { type: [string, 'null'] }
    OrchestrationPlannerItem:
      type: object
      required: [id, title, status, dependencyState, dependsOn, blockers]
      properties:
        id: { type: string }
        title: { type: string }
        taskType: { type: [string, 'null'] }
        stage: { type: [string, 'null'] }
        status: { type: string, enum: [active, waiting, blocked, done] }
        owner:
          type: [object, 'null']
          properties:
            id: { type: [string, 'null'] }
            label: { type: string }
        dependencyState: { type: string, enum: [ready, blocked, in_progress, done] }
        dependsOn:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationDependencyRef'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationBlocker'
    OrchestrationPlannerSummary:
      type: object
      required: [total, readyCount, blockedCount, inProgressCount, doneCount, invalidCount]
      properties:
        total: { type: integer }
        readyCount: { type: integer }
        blockedCount: { type: integer }
        inProgressCount: { type: integer }
        doneCount: { type: integer }
        invalidCount: { type: integer }
    OrchestrationPlannerResponse:
      type: object
      required: [summary, readyWork, items]
      properties:
        summary:
          $ref: '#/components/schemas/OrchestrationPlannerSummary'
        readyWork:
          type: array
          items:
            type: object
            required: [id, title, taskType, dependsOn]
            properties:
              id: { type: string }
              title: { type: string }
              taskType: { type: [string, 'null'] }
              dependsOn:
                type: array
                items:
                  $ref: '#/components/schemas/OrchestrationDependencyRef'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationPlannerItem'
    OrchestrationRunItem:
      type: object
      required: [id, title, state, dependencyState, dependsOn, blockers, dispatchAttempts, delegated]
      properties:
        id: { type: string }
        title: { type: string }
        taskType: { type: [string, 'null'] }
        stage: { type: [string, 'null'] }
        owner:
          type: [object, 'null']
          properties:
            id: { type: [string, 'null'] }
            label: { type: string }
        state: { type: string, enum: [ready, running, blocked, failed, completed] }
        dependencyState: { type: string, enum: [ready, blocked, in_progress, done] }
        dependsOn:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationDependencyRef'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationBlocker'
        specialist: { type: [string, 'null'] }
        actualAgent: { type: [string, 'null'] }
        fallbackReason: { type: [string, 'null'] }
        userFacingReasonCategory: { type: [string, 'null'] }
        lastMessage: { type: [string, 'null'] }
        lastUpdatedAt: { type: [string, 'null'], format: date-time }
        lastDispatchAt: { type: [string, 'null'], format: date-time }
        dispatchAttempts: { type: integer }
        delegated: { type: boolean }
    OrchestrationRunSummary:
      type: object
      required: [total, readyCount, runningCount, blockedCount, failedCount, completedCount]
      properties:
        total: { type: integer }
        readyCount: { type: integer }
        runningCount: { type: integer }
        blockedCount: { type: integer }
        failedCount: { type: integer }
        completedCount: { type: integer }
    OrchestrationRunResponse:
      type: object
      required: [runId, state, startedAt, updatedAt, coordinatorAgent, summary, items]
      properties:
        runId: { type: [string, 'null'] }
        state: { type: string, enum: [not_started, empty, active, idle, failed, complete] }
        startedAt: { type: [string, 'null'], format: date-time }
        updatedAt: { type: [string, 'null'], format: date-time }
        coordinatorAgent: { type: [string, 'null'] }
        summary:
          $ref: '#/components/schemas/OrchestrationRunSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrchestrationRunItem'
    OrchestrationViewResponse:
      type: object
      required: [planner, run]
      properties:
        planner:
          $ref: '#/components/schemas/OrchestrationPlannerResponse'
        run:
          $ref: '#/components/schemas/OrchestrationRunResponse'
    TaskDetailViewResponse:
      type: object
      required: [task, summary, blockers, context, relations, activity, telemetry, meta]
      properties:
        task:
          type: object
          required: [id, title, priority, stage, status]
          properties:
            id: { type: string }
            title: { type: string }
            priority: { type: [string, 'null'] }
            stage: { type: [string, 'null'] }
            status: { type: string, enum: [active, waiting, blocked, done] }
        summary:
          type: object
          required: [owner, workflowStage, nextAction, prStatus, childStatus, timers, blockedState]
          properties:
            owner:
              $ref: '#/components/schemas/TaskDetailActor'
            workflowStage:
              type: object
              required: [value, label]
              properties:
                value: { type: [string, 'null'] }
                label: { type: string }
            nextAction:
              type: object
              required: [label, source, overdue, waitingOn]
              properties:
                label: { type: string }
                source: { type: string }
                overdue: { type: boolean }
                waitingOn: { type: [string, 'null'] }
            prStatus:
              $ref: '#/components/schemas/TaskDetailStatusRollup'
            childStatus:
              $ref: '#/components/schemas/TaskDetailStatusRollup'
            timers:
              type: object
              required: [queueEnteredAt, queueAgeLabel, lastUpdatedAt, freshness]
              properties:
                queueEnteredAt: { type: [string, 'null'], format: date-time }
                queueAgeLabel: { type: string }
                lastUpdatedAt: { type: [string, 'null'], format: date-time }
                freshness: { type: string, enum: [fresh, stale, unknown] }
            blockedState:
              type: object
              required: [isBlocked, label, waitingOn]
              properties:
                isBlocked: { type: boolean }
                label: { type: string, enum: [Active, Waiting, Blocked, Done] }
                waitingOn: { type: [string, 'null'] }
        blockers:
          type: array
          items:
            type: object
            required: [id, type, label, source, owner, ageLabel, occurredAt, reason, childTaskId, freezeScope, viewable, commentable, nextRequiredAction, childTask]
            properties:
              id: { type: string }
              type: { type: string }
              label: { type: string }
              source: { type: string }
              owner:
                $ref: '#/components/schemas/TaskDetailActor'
              ageLabel: { type: string }
              occurredAt: { type: [string, 'null'], format: date-time }
              reason: { type: [string, 'null'] }
              childTaskId: { type: [string, 'null'] }
              freezeScope:
                type: array
                items: { type: string }
              viewable: { type: boolean }
              commentable: { type: boolean }
              nextRequiredAction: { type: [string, 'null'] }
              childTask:
                type: [object, 'null']
                properties:
                  id: { type: string }
                  title: { type: string }
                  stage: { type: [string, 'null'] }
                  status: { type: string, enum: [active, waiting, blocked, done] }
                  owner:
                    $ref: '#/components/schemas/TaskDetailActor'
                  waitingState: { type: [string, 'null'] }
        context:
          type: object
          required: [intakeDraft, operatorIntakeRequirements, executionContract, businessContext, acceptanceCriteria, definitionOfDone, technicalSpec, monitoringSpec, pmBusinessContextReview]
          properties:
            intakeDraft:
              type: boolean
              description: True when the task is an Intake Draft created from raw operator requirements.
            operatorIntakeRequirements:
              type: [string, 'null']
              description: Raw operator requirements captured at intake and shown above refined execution-contract sections.
            executionContract:
              type: object
              additionalProperties: true
              description: Latest structured, versioned Execution Contract projection. Markdown views are generated from this data and are not authoritative; approved projections expose committed scope separately from out-of-scope, deferred, and follow-up items. When repo artifacts have been generated, `executionContract.artifacts.links` exposes the generated user-story and Refinement Decision Log paths, and `executionContract.artifacts.pr_guidance` exposes display-ID PR title/body guidance.
            businessContext: { type: [string, 'null'] }
            acceptanceCriteria:
              type: array
              items: { type: string }
            definitionOfDone:
              type: array
              items: { type: string }
            technicalSpec: { type: [string, 'null'] }
            monitoringSpec: { type: [string, 'null'] }
            architectHandoff:
              type: [object, 'null']
              additionalProperties: true
              description: Latest architect handoff metadata, including engineer tier decisions when available.
            activityMonitoring:
              type: [object, 'null']
              additionalProperties: true
              description: Delivery-loop activity monitoring summary, including missed engineer check-in state.
            reassignment:
              type: [object, 'null']
              additionalProperties: true
              description: Latest reassignment summary, including any tier-specific assignee id selected during responsible escalation or inactivity reassignment.
            ghostingReview:
              type: [object, 'null']
              additionalProperties: true
              description: Linked governance review task created for inactivity or other governance follow-up.
            anomalyChildTask:
              type: [object, 'null']
              description: Machine-generated anomaly context used when a child task is created directly from SRE monitoring telemetry.
              properties:
                machineGenerated: { type: boolean }
                sourceTaskId: { type: [string, 'null'] }
                service: { type: [string, 'null'] }
                summary: { type: [string, 'null'] }
                metrics:
                  type: array
                  items: { type: string }
                logs:
                  type: array
                  items: { type: string }
                errorSamples:
                  type: array
                  items: { type: string }
                prefill:
                  type: [object, 'null']
                  properties:
                    service: { type: [string, 'null'] }
                    anomalySummary: { type: [string, 'null'] }
                    metrics:
                      type: array
                      items: { type: string }
                    logs:
                      type: array
                      items: { type: string }
                    errorSamples:
                      type: array
                      items: { type: string }
                finalizedByPm: { type: boolean }
                finalizedAt: { type: [string, 'null'], format: date-time }
                finalizedBy: { type: [string, 'null'] }
            pmBusinessContextReview:
              type: object
              required: [completedAt, completedBy, finalized]
              properties:
                completedAt: { type: [string, 'null'], format: date-time }
                completedBy: { type: [string, 'null'] }
                finalized: { type: boolean }
            sreMonitoring:
              type: [object, 'null']
              description: SRE monitoring workflow summary, including deployment evidence, countdown state, telemetry drilldowns, approval snapshot, and expiry escalation details when present.
              properties:
                state: { type: string }
                windowStartedAt: { type: [string, 'null'], format: date-time }
                windowEndsAt: { type: [string, 'null'], format: date-time }
                timeRemainingLabel: { type: [string, 'null'] }
                riskLevel: { type: [string, 'null'] }
                deployment:
                  type: [object, 'null']
                  properties:
                    environment: { type: [string, 'null'] }
                    url: { type: [string, 'null'], format: uri }
                    version: { type: [string, 'null'] }
                telemetry:
                  type: [object, 'null']
                  additionalProperties: true
                approval:
                  type: [object, 'null']
                  additionalProperties: true
                escalation:
                  type: [object, 'null']
                  additionalProperties: true
            closeGovernance:
              type: [object, 'null']
              description: Governed close-review summary, including normalized readiness, cancellation recommendations, human decisions, explicit `decisionReady`/`pendingReason` semantics, and additive escalation cards for monitoring expiry or exceptional dispute handling.
              additionalProperties: true
        relations:
          type: object
          required: [linkedPrs, childTasks, parentTask]
          properties:
            linkedPrs:
              type: array
              items:
                type: object
                additionalProperties: true
            parentTask:
              type: [object, 'null']
              properties:
                id: { type: string }
                title: { type: string }
                stage: { type: [string, 'null'] }
                status: { type: string, enum: [active, waiting, blocked, done] }
                owner:
                  $ref: '#/components/schemas/TaskDetailActor'
                blocked: { type: boolean }
                waitingState: { type: [string, 'null'] }
            childTasks:
              type: array
              items:
                type: object
                required: [id, title, stage, status, owner, blocked, waitingState]
                properties:
                  id: { type: string }
                  title: { type: string }
                  stage: { type: [string, 'null'] }
                  status: { type: string, enum: [active, waiting, blocked, done] }
                  owner:
                    $ref: '#/components/schemas/TaskDetailActor'
                  blocked: { type: boolean }
                  waitingState: { type: [string, 'null'] }
        activity:
          type: object
          required: [comments, auditLog]
          properties:
            comments:
              type: array
              items:
                type: object
                additionalProperties: true
            auditLog:
              type: array
              items:
                type: object
                additionalProperties: true
        telemetry:
          type: object
          required: [availability, lastUpdatedAt, summary, emptyStateReason, access]
          properties:
            availability: { type: string, enum: [available, empty, error, stale, restricted] }
            lastUpdatedAt: { type: [string, 'null'], format: date-time }
            summary:
              type: object
              additionalProperties: true
            emptyStateReason: { type: [string, 'null'] }
            access:
              type: [object, 'null']
              additionalProperties: true
        orchestration:
          type: [object, 'null']
          description: Additive dependency-planner and orchestration run view model for authorized callers.
          allOf:
            - $ref: '#/components/schemas/OrchestrationViewResponse'
        meta:
          type: object
          required: [permissions, freshness]
          properties:
            permissions:
              type: object
              required: [canViewComments, canViewAuditLog, canViewTelemetry, canViewChildTasks, canViewLinkedPrMetadata, canViewOrchestration]
              properties:
                canViewComments: { type: boolean }
                canViewAuditLog: { type: boolean }
                canViewTelemetry: { type: boolean }
                canViewChildTasks: { type: boolean }
                canViewLinkedPrMetadata: { type: boolean }
                canViewOrchestration: { type: boolean }
            freshness:
              type: object
              required: [status, lastUpdatedAt, liveUpdates, refreshBehavior]
              properties:
                status: { type: string, enum: [fresh, stale, unknown] }
                lastUpdatedAt: { type: [string, 'null'], format: date-time }
                liveUpdates: { type: boolean }
                refreshBehavior: { type: string }
  responses:
    Unauthorized:
      description: Missing or invalid bearer token / auth context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    Forbidden:
      description: Authenticated caller lacks the required role permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    FeatureDisabled:
      description: Audit foundation is disabled by runtime feature flag
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
security:
  - BearerAuth: []
paths:
  /tasks/{id}:
    get:
      summary: Canonical Task Detail summary contract
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Task summary for above-the-fold Task Detail rendering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSummaryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/history:
    get:
      summary: Query paginated projected task history, newest first
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - name: eventType
          in: query
          schema: { type: string }
          description: Repeatable server-side event-type filter.
        - name: actorId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 25 }
        - name: cursor
          in: query
          schema: { type: integer, minimum: 0 }
          description: Exclusive sequence-number cursor for the next page.
      responses:
        '200':
          description: Paginated history timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskHistoryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/observability-summary:
    get:
      summary: Return role-appropriate telemetry summary and approved correlation pointers
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Observability summary for Task Detail telemetry tab
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservabilitySummaryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/detail:
    get:
      summary: Canonical server-prepared task detail read model for the task detail page
      description: Returns the full task detail view model used by the task detail UI, including summary, blockers, grouped context, relations, activity, telemetry, optional orchestration visibility, and explicit permission/freshness metadata.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Canonical task detail page payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailViewResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/orchestration:
    get:
      summary: Return the dependency planner and orchestration state for a parent task
      description: Requires `relationships:read` and returns the same orchestration planner/run payload embedded in task detail when enabled.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Canonical orchestration planner/run payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationViewResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
    post:
      summary: Evaluate and persist an orchestration run for the task's ready child work
      description: Starts or refreshes coordinator-managed orchestration state, dispatching only ready work items when scheduler routing is enabled.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                idempotencyKey: { type: string }
                actorType: { type: string }
                source: { type: string }
                concurrencyLimit: { type: integer, minimum: 1 }
      responses:
        '202':
          description: Orchestration run evaluated and persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationViewResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
