openapi: 3.1.0
info:
  title: Task Detail History & Telemetry Read API
  version: 0.2.0
  description: Canonical read-side contracts for SF-019 / issue #27. These contracts are additive on top of the SF-017 audit foundation and are safe for the Task Detail UI to consume without frontend inference.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
    ActorHeader:
      name: x-actor-id
      in: header
      required: false
      description: Legacy-only fallback header when `ALLOW_LEGACY_HEADERS=true`; JWT bearer auth is the default contract.
      schema: { type: string }
  schemas:
    StandardErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details:
              type: object
              additionalProperties: true
    TaskSummaryResponse:
      type: object
      required: [task_id, tenant_id, title, priority, current_stage, current_owner, blocked, freshness, status_indicator, closed]
      properties:
        task_id: { type: string }
        tenant_id: { type: string }
        title: { type: string }
        priority: { type: [string, 'null'] }
        current_stage: { type: [string, 'null'] }
        current_owner: { type: [string, 'null'] }
        owner:
          type: [object, 'null']
          properties:
            actor_id: { type: string }
            display_name: { type: string }
        blocked: { type: boolean }
        waiting_state: { type: [string, 'null'] }
        next_required_action: { type: [string, 'null'] }
        freshness:
          type: object
          required: [status, last_updated_at]
          properties:
            status: { type: string, enum: [fresh, stale, unknown] }
            last_updated_at: { type: [string, 'null'], format: date-time }
        status_indicator: { type: string }
        status:
          type: object
          required: [blocked, waiting_state, closed, freshness]
          properties:
            blocked: { type: boolean }
            waiting_state: { type: [string, 'null'] }
            closed: { type: boolean }
            freshness: { type: string }
        closed: { type: boolean }
    TaskHistoryItem:
      type: object
      required: [item_id, event_id, event_type, occurred_at, actor, sequence_number, summary, display]
      properties:
        item_id: { type: string, description: Stable timeline item identifier. Equal to event_id for canonical audit events. }
        event_id: { type: string }
        tenant_id: { type: string }
        event_type: { type: string }
        event_type_label: { type: string }
        occurred_at: { type: string, format: date-time }
        recorded_at: { type: [string, 'null'], format: date-time }
        actor:
          type: object
          required: [actor_id, actor_type]
          properties:
            actor_id: { type: string }
            actor_type: { type: string }
            display_name: { type: [string, 'null'] }
        actor_id: { type: string }
        actor_type: { type: string }
        sequence_number: { type: integer }
        summary: { type: string, description: Backend-generated canonical human-readable timeline summary. }
        display:
          type: object
          required: [summary, event_type_label, is_known_type, fallback_used]
          properties:
            summary: { type: string }
            event_type_label: { type: string }
            is_known_type: { type: boolean }
            fallback_used: { type: boolean }
        correlation:
          type: [object, 'null']
          properties:
            correlation_id: { type: [string, 'null'] }
            trace_id: { type: [string, 'null'] }
        source: { type: [string, 'null'] }
        payload:
          type: object
          additionalProperties: true
    PaginatedTaskHistoryResponse:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskHistoryItem'
        page_info:
          type: object
          required: [limit, next_cursor, has_more]
          properties:
            limit: { type: integer }
            next_cursor: { type: [string, 'null'] }
            has_more: { type: boolean }
    ObservabilitySummaryResponse:
      type: object
      required: [task_id, tenant_id, status, last_updated_at, freshness, degraded, event_count, key_signals, correlation, access]
      properties:
        task_id: { type: string }
        tenant_id: { type: string }
        status: { type: string, enum: [ok, degraded] }
        last_updated_at: { type: [string, 'null'], format: date-time }
        freshness:
          type: object
          required: [status, last_updated_at]
          properties:
            status: { type: string, enum: [fresh, stale] }
            last_updated_at: { type: [string, 'null'], format: date-time }
        degraded: { type: boolean }
        stale: { type: boolean }
        event_count: { type: integer }
        key_signals:
          type: object
          additionalProperties: true
        correlation:
          type: object
          required: [approved_correlation_ids, approved_links]
          properties:
            approved_correlation_ids:
              type: array
              items: { type: string }
            approved_links:
              type: array
              items:
                type: object
                additionalProperties: true
        access:
          type: object
          required: [restricted, scope, omission_applied, omitted_fields]
          properties:
            restricted: { type: boolean }
            scope: { type: string, enum: [summary_only, operator] }
            omission_applied: { type: boolean }
            omitted_fields:
              type: array
              items: { type: string }
        last_event_id: { type: string }
        last_event_type: { type: string }
        current_stage: { type: [string, 'null'] }
        correlation_ids:
          type: array
          items: { type: string }
        trace_ids:
          type: array
          items: { type: string }
        metrics:
          type: object
          additionalProperties: true
        links:
          type: array
          items:
            type: object
            additionalProperties: true
    TaskDetailActor:
      type: object
      required: [id, label, kind]
      properties:
        id: { type: [string, 'null'] }
        label: { type: string }
        kind: { type: string, enum: [assigned, unassigned, restricted, missing] }
    TaskDetailStatusRollup:
      type: object
      required: [label, state, total]
      properties:
        label: { type: string }
        state: { type: string, enum: [empty, active, waiting, blocked, done, draft, mixed] }
        total: { type: integer }
        mergedCount: { type: integer }
        openCount: { type: integer }
        draftCount: { type: integer }
        blockedCount: { type: integer }
    TaskDetailViewResponse:
      type: object
      required: [task, summary, blockers, context, relations, activity, telemetry, meta]
      properties:
        task:
          type: object
          required: [id, title, priority, stage, status]
          properties:
            id: { type: string }
            title: { type: string }
            priority: { type: [string, 'null'] }
            stage: { type: [string, 'null'] }
            status: { type: string, enum: [active, waiting, blocked, done] }
        summary:
          type: object
          required: [owner, workflowStage, nextAction, prStatus, childStatus, timers, blockedState]
          properties:
            owner:
              $ref: '#/components/schemas/TaskDetailActor'
            workflowStage:
              type: object
              required: [value, label]
              properties:
                value: { type: [string, 'null'] }
                label: { type: string }
            nextAction:
              type: object
              required: [label, source, overdue, waitingOn]
              properties:
                label: { type: string }
                source: { type: string }
                overdue: { type: boolean }
                waitingOn: { type: [string, 'null'] }
            prStatus:
              $ref: '#/components/schemas/TaskDetailStatusRollup'
            childStatus:
              $ref: '#/components/schemas/TaskDetailStatusRollup'
            timers:
              type: object
              required: [queueEnteredAt, queueAgeLabel, lastUpdatedAt, freshness]
              properties:
                queueEnteredAt: { type: [string, 'null'], format: date-time }
                queueAgeLabel: { type: string }
                lastUpdatedAt: { type: [string, 'null'], format: date-time }
                freshness: { type: string, enum: [fresh, stale, unknown] }
            blockedState:
              type: object
              required: [isBlocked, label, waitingOn]
              properties:
                isBlocked: { type: boolean }
                label: { type: string, enum: [Active, Waiting, Blocked, Done] }
                waitingOn: { type: [string, 'null'] }
        blockers:
          type: array
          items:
            type: object
            required: [id, type, label, source, owner, ageLabel, occurredAt]
            properties:
              id: { type: string }
              type: { type: string }
              label: { type: string }
              source: { type: string }
              owner:
                $ref: '#/components/schemas/TaskDetailActor'
              ageLabel: { type: string }
              occurredAt: { type: [string, 'null'], format: date-time }
        context:
          type: object
          required: [businessContext, acceptanceCriteria, definitionOfDone, technicalSpec, monitoringSpec]
          properties:
            businessContext: { type: [string, 'null'] }
            acceptanceCriteria:
              type: array
              items: { type: string }
            definitionOfDone:
              type: array
              items: { type: string }
            technicalSpec: { type: [string, 'null'] }
            monitoringSpec: { type: [string, 'null'] }
        relations:
          type: object
          required: [linkedPrs, childTasks]
          properties:
            linkedPrs:
              type: array
              items:
                type: object
                additionalProperties: true
            childTasks:
              type: array
              items:
                type: object
                required: [id, title, stage, status, owner, blocked]
                properties:
                  id: { type: string }
                  title: { type: string }
                  stage: { type: [string, 'null'] }
                  status: { type: string, enum: [active, waiting, blocked, done] }
                  owner:
                    $ref: '#/components/schemas/TaskDetailActor'
                  blocked: { type: boolean }
        activity:
          type: object
          required: [comments, auditLog]
          properties:
            comments:
              type: array
              items:
                type: object
                additionalProperties: true
            auditLog:
              type: array
              items:
                type: object
                additionalProperties: true
        telemetry:
          type: object
          required: [availability, lastUpdatedAt, summary, emptyStateReason, access]
          properties:
            availability: { type: string, enum: [available, empty, error, stale, restricted] }
            lastUpdatedAt: { type: [string, 'null'], format: date-time }
            summary:
              type: object
              additionalProperties: true
            emptyStateReason: { type: [string, 'null'] }
            access:
              type: [object, 'null']
              additionalProperties: true
        meta:
          type: object
          required: [permissions, freshness]
          properties:
            permissions:
              type: object
              required: [canViewComments, canViewAuditLog, canViewTelemetry, canViewChildTasks, canViewLinkedPrMetadata]
              properties:
                canViewComments: { type: boolean }
                canViewAuditLog: { type: boolean }
                canViewTelemetry: { type: boolean }
                canViewChildTasks: { type: boolean }
                canViewLinkedPrMetadata: { type: boolean }
            freshness:
              type: object
              required: [status, lastUpdatedAt, liveUpdates, refreshBehavior]
              properties:
                status: { type: string, enum: [fresh, stale, unknown] }
                lastUpdatedAt: { type: [string, 'null'], format: date-time }
                liveUpdates: { type: boolean }
                refreshBehavior: { type: string }
  responses:
    Unauthorized:
      description: Missing or invalid bearer token / auth context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    Forbidden:
      description: Authenticated caller lacks the required role permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
    FeatureDisabled:
      description: Audit foundation is disabled by runtime feature flag
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
security:
  - BearerAuth: []
paths:
  /tasks/{id}:
    get:
      summary: Canonical Task Detail summary contract
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Task summary for above-the-fold Task Detail rendering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSummaryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/history:
    get:
      summary: Query paginated projected task history, newest first
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - name: eventType
          in: query
          schema: { type: string }
          description: Repeatable server-side event-type filter.
        - name: actorId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 25 }
        - name: cursor
          in: query
          schema: { type: integer, minimum: 0 }
          description: Exclusive sequence-number cursor for the next page.
      responses:
        '200':
          description: Paginated history timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskHistoryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/observability-summary:
    get:
      summary: Return role-appropriate telemetry summary and approved correlation pointers
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Observability summary for Task Detail telemetry tab
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservabilitySummaryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
  /tasks/{id}/detail:
    get:
      summary: Canonical server-prepared task detail read model for the task detail page
      description: Returns the full task detail view model used by the task detail UI, including summary, blockers, grouped context, relations, activity, telemetry, and explicit permission/freshness metadata.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorHeader'
      responses:
        '200':
          description: Canonical task detail page payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailViewResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/FeatureDisabled' }
