openapi: 3.0.3
info:
  title: Task Assignment API
  version: 1.2.0
  description: |
    API contract for assigning an AI agent owner to a task.
    The runtime accepts both `/tasks/...` and `/api/tasks/...` paths; `/tasks/...` is the canonical route shape used elsewhere in this repo.
    Governance note: assignment runtime changes should update this spec in the same pull request.
    Delivery-loop mutations that are reserved for the currently assigned engineer role now reject callers
    that no longer match the task's canonical assignee.
    Shared browser surfaces such as `/inbox/sre` remain read-only unless a dedicated workflow endpoint is used.
    SRE anomaly-to-child-task creation is a separate dedicated workflow endpoint and does not mutate assignment state directly.
paths:
  /tasks/{taskId}/assignment:
    patch:
      summary: Assign, reassign, or clear an AI agent owner for a task
      operationId: assignTaskOwner
      tags:
        - Tasks
      security:
        - BearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
                  nullable: true
                  description: Unique identifier of the active AI agent to assign. Use `null` or an empty string to clear assignment.
                  example: qa
                actorType:
                  type: string
                  description: Optional actor type override for the generated audit event.
                  example: user
                idempotencyKey:
                  type: string
                  description: Optional caller-supplied idempotency key.
      responses:
        '200':
          description: Task owner updated
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required: [taskId, owner, updatedAt, duplicate, eventId]
                    properties:
                      taskId:
                        type: string
                        example: TSK-002
                      owner:
                        oneOf:
                          - type: 'null'
                          - type: object
                            required: [agentId, displayName, role]
                            properties:
                              agentId:
                                type: string
                                example: qa
                              displayName:
                                type: string
                                example: QA Engineer
                              role:
                                type: string
                                nullable: true
                                example: QA
                      updatedAt:
                        type: string
                        format: date-time
                      duplicate:
                        type: boolean
                        description: True when the idempotent event write was deduplicated.
                      eventId:
                        type: string
        '400':
          description: Invalid request or inactive agent id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '403':
          description: Caller lacks `assignment:write`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                wrongAssignedRole:
                  value:
                    error:
                      code: forbidden
                      message: Only the currently assigned owner may perform this action.
                      request_id: req-example
                      requestId: req-example
                      details:
                        assignee: engineer-sr
                        allowed_roles:
                          - engineer
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '503':
          description: Assignment feature flag disabled or kill switch enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
components:
  schemas:
    StandardErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id, requestId]
          properties:
            code:
              type: string
            error_id:
              type: string
              nullable: true
            message:
              type: string
            request_id:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
