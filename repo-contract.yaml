schema_version: '1.0'
standards_version: 0.1.0
repo:
  name: engineering-team
  type: application
  primary_deployment_unit: engineering-team
  runtime_model: application-runtime
  production_affecting: true
profile: application
overlays: [production-affecting]
ownership:
  primary_owner: wiinc1
  backup_owner: wiinc1
runtime:
  languages:
  - name: javascript
    version: Node.js 22 runtime
  - name: typescript
    version: '5.9'
  - name: python
    version: '3.12'
  - name: sql
    version: PostgreSQL-compatible migrations
  toolchains: [node, npm, vite, react, typescript, vitest, playwright, python3, unittest, make, git, docker, postgresql]
  package_managers: [npm, pip]
commands:
  lint: make lint
  typecheck: make typecheck
  test: make test
  build: make build
  verify: make verify
directories:
  reserved_paths: [src/, api/, lib/, db/, tests/, docs/, scripts/, monitoring/, observability/, config/, generated/, third_party/, .github/, .artifacts/]
  classifications:
    src/: authored
    api/: authored
    lib/: authored
    db/: authored
    tests/: authored
    docs/: authored
    scripts/: authored
    monitoring/: authored
    observability/: artifacts
    dev-standards/: authored
    .github/: authored
    generated/: generated
    third_party/: third_party
    .artifacts/: artifacts
  protected_paths: [repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, dev-standards/, .github/workflows/, Makefile, DESIGN.md]
architecture:
  reference_scan_globs:
  - src/**/*.js
  - src/**/*.jsx
  - src/**/*.ts
  - src/**/*.tsx
  - api/**/*.js
  - lib/**/*.js
  - db/migrations/**/*.sql
  - scripts/**/*.js
  - scripts/**/*.mjs
  - tests/**/*.js
  - tests/**/*.ts
  - tests/**/*.tsx
  - tests/**/*.py
  - monitoring/**/*.json
  - monitoring/**/*.yml
  - docs/**/*.md
  - docs/diagrams/*.mmd
  - dev-standards/**/*.py
  - dev-standards/**/*.md
  - dev-standards/**/*.yaml
  - dev-standards/**/*.yml
  - .github/workflows/*.yml
  - package.json
  - vite.config.js
  - playwright.config.ts

  - Makefile
  - repo-contract.yaml
  - check-manifest.yaml
  internal_layout: [src/app/, src/components/, src/features/, api/, lib/auth/, lib/audit/, lib/http/, lib/task-platform/, lib/software-factory/, db/migrations/, scripts/, monitoring/, tests/, docs/, dev-standards/, .github/workflows/]
  dependency_rules:
  - standards tooling depends on the repo contract, not ad hoc conventions
  - browser feature modules depend on route adapters and browser session utilities instead of server-only state
  - API adapters delegate to shared lib handlers and preserve operator-hosted reverse-proxy boundaries
  - auth, audit, task-platform, and software-factory modules own their runtime state transitions
  - monitoring and observability assets describe runtime behavior but must not contain secrets
  - workflow and standards gates are declared in Makefile, package.json, check-manifest.yaml, and GitHub Actions
  boundary_map:
  - from: src/app/
    to: src/features/
    rule: allow
  - from: src/features/
    to: src/components/
    rule: allow
  - from: api/
    to: lib/
    rule: allow
  - from: scripts/
    to: lib/
    rule: allow
  - from: dev-standards/
    to: repo-contract.yaml
    rule: allow
  - from: .github/workflows/
    to: Makefile
    rule: allow
  state_ownership:
  - resource: standards-policy
    owner: dev-standards
  - resource: browser-session-config
    owner: src/app/
  - resource: browser-feature-routes
    owner: src/features/
  - resource: serverless-api-routing
    owner: api/
  - resource: auth-state
    owner: lib/auth/
  - resource: workflow-audit-events
    owner: lib/audit/
  - resource: canonical-task-records
    owner: lib/task-platform/
  - resource: specialist-delegation-routing
    owner: lib/software-factory/
  - resource: database-migrations
    owner: db/migrations/
  - resource: runtime-monitoring-assets
    owner: monitoring/
  - resource: generated-runtime-evidence
    owner: observability/
  source_of_truth: [repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, package.json, Makefile, .github/workflows/validation.yml, .github/workflows/verify.yml, docs/architecture.md, docs/runbook.md, DESIGN.md]
  python_layers:
  - name: standards_tooling
    paths: [dev-standards/tooling/**/*.py]
    module_prefixes: [build_release_evidence, check_maintainability, maintainability_core, repo_policy_utils, run_python_tests, standards_init, validate_agent_intent, validate_approval_proof, validate_architecture, validate_artifact_provenance, validate_change_metadata, validate_config_boundaries, validate_docs_freshness, validate_live_approval, validate_policy_files, validate_release_evidence, validate_shell_boundaries, validate_test_policy, validate_traceability, validate_visual_identity, validate_waivers]
  - name: standards_tests
    paths: [tests/**/*.py]
    module_prefixes: [tests]
  allowed_layer_edges:
    standards_tooling: [standards_tooling]
    standards_tests: [standards_tests, standards_tooling]
  python_import_rules: []
  runtime_boundary_rules:
  - paths:
    - tests/**/*.py
    forbidden_references: [requests.get, requests.post, requests.put, requests.delete]
    allowed_in: []
    description: unit and validator tests must stay hermetic
  shell_command_rules: []
  config_boundary_rules: []
  banned_patterns: []
critical_paths:
- name: standards-enforcement
  description: repo-local standards, documentation, maintainability, and change-evidence enforcement entrypoints
  stronger_controls: [protected path policy, deterministic make targets, npm standards checks]
- name: browser-runtime
  description: Vite and React browser routes for sign-in, task workspace, detail, role inbox, and task creation flows
  stronger_controls: [TypeScript checks, Vitest UI tests, Playwright browser tests, Vite build]
- name: http-api-runtime
  description: Operator-hosted Node HTTP/API adapters for auth, audit, and task-platform request paths
  stronger_controls: [Node unit tests, contract tests, security tests, deployment build]
- name: auth-audit-task-platform-state
  description: PostgreSQL-backed auth, audit, task-platform, and merge-readiness state transitions
  stronger_controls: [migration tests, rollout scripts, smoke diagnostics, monitoring alerts]
- name: deployment-and-observability
  description: Coordinated-stack deployment, monitoring dashboards, alerts, and redacted runtime evidence
  stronger_controls: [npm build, auth config diagnostics, monitoring docs, artifact provenance]
quality_gates:
  risk_taxonomy: [low, medium, high, critical]
  review_modes: [automated-only, human-approve, human-plus-evidence]
  stop_the_line: [broken required verification, secret exposure, protected path violation, expired waiver]
  test_layers: [unit, ui, browser, contract, integration, e2e, property, performance, security, chaos, standards]
  documentation_requirements: [standards changes require changelog or runbook updates, runtime changes require architecture or runbook updates, deployment changes require release evidence]
  coverage_policy:
    strategy: risk-based
    global_floor: 0.8
    critical_path_floor: 0.9
change_management:
  metadata_file: .artifacts/change-metadata.json
  approval_file: .artifacts/approval-record.json
  approval_sources:
    mode: artifact
    local_artifact: .artifacts/approval-record.json
    live_artifact: .artifacts/live-approval.json
    require_live_in_ci: false
    ci_event_names: [pull_request]
    required_review_state: APPROVED
    required_approvers: [wiinc1]
    require_current_head_sha: true
  traceability_sources:
    live_artifact: .artifacts/live-traceability.json
    ci_event_names: [pull_request]
  required_fields: [change_kind, risk, reversibility, reference, review_mode, provenance, human_instruction]
  allowed_change_kinds: [feature, bugfix, refactor, security-fix, policy, docs-only, release, migration]
  required_when_paths: ['**']
  reference_rules:
  - prefix: ADR-
    pattern: ^ADR-[0-9]+$
    source: local
    allowed_change_kinds: [policy, docs-only, refactor, feature, bugfix, security-fix, migration, release]
    required_kind: adr
    require_existing_file_globs: ['docs/adr/{reference}.md']
  - prefix: LOCAL-
    pattern: ^LOCAL-[A-Z-]+$
  - prefix: https://github.com/wiinc1/engineering-team/pull/
    pattern: ^https://github\.com/wiinc1/engineering-team/pull/[0-9]+$
    source: github
    allowed_change_kinds: [policy, docs-only, refactor, feature, bugfix, security-fix, migration, release]
    required_kind: pull
  stricter_review_rules:
  - when_paths: [repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, dev-standards/**, .github/workflows/**, Makefile]
    minimum_review_mode: human-plus-evidence
    minimum_risk: high
    require_human_instruction: true
  provenance_rules:
  - provenance: agent
    require_evidence: [commands, evidence]
  - provenance: human-assisted-agent
    require_evidence: [commands, evidence]
  approval_rules:
  - when_paths: [repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, dev-standards/**, .github/workflows/**, Makefile]
    change_kinds: [policy, release, migration]
    require_fields: [approver, approved_at, scope_paths, reference]
  change_kind_rules:
  - change_kind: policy
    allowed_reference_prefixes: [ADR-, LOCAL-, https://github.com/wiinc1/engineering-team/pull/]
release_management:
  evidence_file: .artifacts/release-evidence.json
  default_environment: dev
  freshness_days:
    dev: 7
    staging: 3
    prod: 1
  irreversible_change_evidence: [rollback-verification]
  environments:
    dev: {require_live_deploy_proof: false, required_live_checks: [], require_post_deploy_health: false}
    staging: {require_live_deploy_proof: true, required_live_checks: [deploy-record], require_post_deploy_health: true, required_artifact_fields: [deployed_sha, environment, deployment_url, rollback_target], required_post_deploy_health_fields: [environment, deployment_url, checked_sha, status, commit_verified]}
    prod: {require_live_deploy_proof: true, required_live_checks: [deploy-record, rollback-verification], require_post_deploy_health: true, required_artifact_fields: [deployed_sha, environment, deployment_url, rollback_target], required_post_deploy_health_fields: [environment, deployment_url, checked_sha, status, commit_verified], required_rollback_fields: [rollback_target, verification_status, verified_at]}
artifact_provenance:
  schema_version: '1.0'
  required_fields: [schema_version, generated_by, generated_at, commit_sha]
  required_ci_fields: [source_system, source_record_id, workflow_run_id]
  required_live_fields: [environment, scope]
  artifacts:
  - path: .artifacts/approval-record.json
    expected_generator: manual-seed
  - path: .artifacts/release-evidence.json
  - path: .artifacts/test-results.json
    require_current_commit: true
    expected_generator: run_python_tests.py
  - path: .artifacts/coverage-summary.json
    require_current_commit: true
    expected_generator: run_python_tests.py
  - path: .artifacts/flaky-test-registry.json
    require_current_commit: true
    expected_generator: run_python_tests.py
  - path: .artifacts/contract-test-report.json
    require_current_commit: true
    expected_generator: run_python_tests.py
  - path: .artifacts/live-approval.json
    optional: true
    require_ci_fields: true
    require_live_fields: true
    expected_generator: github-actions-live-evidence
  - path: .artifacts/live-traceability.json
    optional: true
    require_ci_fields: true
    require_live_fields: true
    expected_generator: github-actions-live-evidence
  - path: .artifacts/audit-bundle.json
    required_in_ci: true
    require_current_commit: true
    require_ci_fields: true
    require_live_fields: true
    expected_generator: generate_audit_bundle.py
maintainability:
  include_globs: [src/**/*.py, tests/**/*.py, dev-standards/**/*.py, dev-standards/**/*.md, dev-standards/**/*.yaml, dev-standards/**/*.yml, repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, Makefile]
  exclude_globs: [third_party/**, generated/**, .artifacts/**, dev-standards/schemas/**]
  thresholds:
    authored_source_file_lines:
      warning: 300
      hard_fail: 400
    test_file_lines:
      warning: 400
      hard_fail: 500
    function_lines:
      warning: 40
      hard_fail: 50
    complexity:
      warning: 10
      hard_fail: 15
    nesting_depth:
      warning: 4
      hard_fail: 6
    public_exports:
      warning: 12
      hard_fail: 20
  ratchet_rule: touched noncompliant files must improve on each change and require
    a waiver if still over limit
  protected_signals: [total_file_line_count, over_limit_function_count, maximum_function_length, maximum_complexity, maximum_nesting_depth, public_export_count]
documentation_freshness:
  rules:
  - id: standards
    rule_class: standards
    when_paths: [dev-standards/**, repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, Makefile, .github/workflows/**]
    require_any_of: [CHANGELOG.md, docs/runbook.md]
    allow_reference_prefix: ADR-
    requires_doc_update: true
    when_change_kinds: [policy, docs-only, refactor]
    message: standards changes must update the changelog or runbook
  - id: runtime-operations
    rule_class: runtime
    when_paths: [src/**, lib/**, api/**, db/migrations/**, scripts/**, monitoring/**, package.json, vite.config.js, playwright.config.ts, docker-compose.yml, Dockerfile, Dockerfile.browser]
    require_any_of: [docs/architecture.md, docs/runbook.md, docs/runbooks/**, docs/api/**, docs/design/**, README.md]
    requires_doc_update: true
    when_change_kinds: [feature, bugfix, refactor, security-fix, migration, release]
    message: runtime or operations changes must update architecture, runbook, API, design, or README docs
testing:
  artifacts:
    test_results: .artifacts/test-results.json
    coverage: .artifacts/coverage-summary.json
    flaky_registry: .artifacts/flaky-test-registry.json
    contract_report: .artifacts/contract-test-report.json
  layers:
    unit:
      paths: [tests/test_*.py, tests/unit/**/*.test.js, tests/unit/**/*.test.ts, tests/unit/**/*.test.tsx, src/**/*.test.js, src/**/*.test.ts, src/**/*.test.tsx]
      file_patterns: [test_*.py, '*.test.js', '*.test.ts', '*.test.tsx']
    contract:
      paths: [tests/contract/**/*.py, tests/contract/**/*.test.js]
      file_patterns: [test_*.py, '*.test.js']
  hermeticity:
    unit:
      paths: [tests/test_*.py]
      forbidden_references: [requests.get, requests.post, requests.put, requests.delete]
      allow_in_paths: []
  coverage:
    global_floor: 0.8
    changed_lines_floor: 0.8
    governed_paths: [src/**, api/**, lib/**, scripts/**, tests/**, dev-standards/**]
  regression_requirements:
    change_kinds: [bugfix, security-fix]
    test_paths: [tests/**/*.py, tests/**/*.js, tests/**/*.ts, tests/**/*.tsx, src/**/*.test.js, src/**/*.test.tsx]
  layer_requirements:
  - when_paths: [repo-contract.yaml, agent-policy.yaml, check-manifest.yaml, dev-standards/**]
    required_layers: [unit]
  contract_requirements: []
  flaky_quarantine:
    waiver_rule: flaky-test-quarantine
    allow_quarantine_with_valid_waiver: true
  integration_requirements: []
  system_requirements: []
  ephemeral_environment_requirements: []
  quarantine_policy:
    max_age_days: 30
    require_owner: true
    require_reference: true
support:
  tier: active
  criticality: high
compatibility:
  matrix:
  - {os: linux, runtime: local-operator}
  - {os: macos, runtime: local-operator}
  - {os: linux, runtime: node-22-vite-coordinated-stack}
  - {os: linux, runtime: python-3.12-standards}
  - {os: linux, runtime: postgres-compatible}
  deprecation_policy:
    minimum_notice_days: 30
nfrs:
  reliability:
    availability_target: 99.9%
  latency:
    verify_runtime_seconds_p95: 900
  throughput:
    concurrent_change_validations_supported: 1
  security:
    standards_review_days: 30
  recoverability:
    rto_minutes: 30
    rpo_minutes: 15
waivers: []
visual_identity:
  required: true
  file: DESIGN.md
  validator_command: npm run design:lint
  generated_outputs:
    strategy: committed
    paths:
    - src/app/design-tokens.css
    - src/components/Button/Button.tokens.css
    - src/features/task-creation/TaskCreationForm.tokens.css
    - src/features/task-detail/TaskDetail.tokens.css
    drift_check_command: npm run design:tokens:check
  owner: wiinc1
  reviewers:
  - wiinc1
  review:
    cadence_days: 90
    last_reviewed: '2026-05-08'
