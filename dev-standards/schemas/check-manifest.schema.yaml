$schema: "https://json-schema.org/draft/2020-12/schema"
title: Check Manifest
type: object
additionalProperties: false
required:
  - schema_version
  - standards_version
  - merge_checks
  - release_checks
  - test_artifacts
  - promotion_gates
properties:
  schema_version:
    type: string
    pattern: "^1\\.0$"
  standards_version:
    type: string
  merge_checks:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, description, command, required]
      properties:
        id: { type: string }
        description: { type: string }
        command: { type: string }
        required: { type: boolean }
  release_checks:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, description, evidence]
      properties:
        id: { type: string }
        description: { type: string }
        evidence:
          type: array
          items: { type: string }
        environments:
          type: array
          items:
            type: string
            enum: [dev, staging, prod]
        freshness_days:
          type: integer
  test_artifacts:
    type: object
    additionalProperties: false
    required: [test_results, coverage, flaky_registry, contract_report]
    properties:
      test_results: { type: string }
      coverage: { type: string }
      flaky_registry: { type: string }
      contract_report: { type: string }
  promotion_gates:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [environment, required_evidence]
      properties:
        environment:
          type: string
          enum: [dev, staging, prod]
        required_evidence:
          type: array
          items: { type: string }
        require_immutable_artifact:
          type: boolean
