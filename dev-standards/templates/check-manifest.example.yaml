schema_version: "1.0"
standards_version: "0.1.0"
merge_checks:
  - id: lint
    description: formatting and lint policy
    command: make lint
    required: true
  - id: typecheck
    description: static typing gate
    command: make typecheck
    required: true
  - id: test
    description: automated test suite
    command: make test
    required: true
  - id: build
    description: reproducible build
    command: make build
    required: true
  - id: verify
    description: aggregate merge-readiness gate
    command: make verify
    required: true
release_checks:
  - id: compatibility
    description: supported-version compatibility evidence
    evidence:
      - compatibility-report
  - id: security
    description: security scan evidence
    evidence:
      - vulnerability-scan
      - secret-scan
  - id: deploy-verification
    description: post-deploy verification
    evidence:
      - smoke-test-report
      - rollback-readiness-record
promotion_gates:
  - environment: dev
    required_evidence:
      - lint
      - typecheck
      - test
  - environment: staging
    required_evidence:
      - build
      - compatibility-report
      - integration-report
      - migration-check
  - environment: prod
    required_evidence:
      - immutable-artifact
      - release-approval-record
      - deploy-verification
      - rollback-verification
